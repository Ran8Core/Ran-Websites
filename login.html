<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Restricted Access</title>
    <style>
        /* CSS biar tampilannya modern & dark mode */
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 320px;
            border: 1px solid #333;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            box-sizing: border-box; /* Biar input gak offside */
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #0056b3; }
        #message { color: #ff4d4d; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Locked Access</h2>
        <p style="color: #888;">Enter credentials to enter</p>
        
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        
        <button onclick="handleLogin()">Login</button>
        <p id="message"></p>
    </div>

    <script>
        function handleLogin() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            const msg = document.getElementById('message');

            // Data 3 User kamu
            const users = [
                { user: "admin", pass: "123" },
                { user: "guest", pass: "tamu" },
                { user: "dev", pass: "koding" }
            ];

            const validUser = users.find(u => u.user === userIn && u.pass === passIn);

            if (validUser) {
                // ARAHKAN KE HALAMAN INDEX KAMU
                window.location.href = "index.html"; 
            } else {
                msg.innerText = "Akses ditolak! Cek lagi.";
            }
        }
    </script>
</body>
</html>
