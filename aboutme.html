<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - Ran</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .about-card {
            background: #161616;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #222;
            width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: #333;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            border: 2px solid #007bff;
        }

        h2 { margin: 10px 0; letter-spacing: 2px; }

        /* Efek Ngetik */
        .typing-container {
            height: 20px;
            margin-bottom: 30px;
        }
        
        .typing {
            color: #007bff;
            font-weight: bold;
            border-right: 2px solid #007bff;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: blink 0.7s infinite;
        }

        @keyframes blink { 50% { border-color: transparent; } }

        .bio {
            color: #aaa;
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 25px;
            color: white;
            text-decoration: none;
            border: 1px solid #444;
            border-radius: 30px;
            transition: 0.3s;
            font-size: 13px;
        }

        .back-btn:hover {
            background: white;
            color: black;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="about-card">
        <div class="profile-img">👤</div>
        <h2 id="name-display">RAN</h2>
        
        <div class="typing-container">
            <span class="typing" id="typing-text"></span>
        </div>

        <p class="bio">
           TJKT Student | Minecraft Survivalist | Web Developer Enthusiast. 
            Focused on building clean interfaces and long-term Minecraft worlds.
        </p>

        <a href="home.html" class="back-btn">← Back to Dashboard</a>
    </div>

    <script>
        // Ambil nama dari login (biar tetep personal)
        const user = localStorage.getItem("activeUser") || "RAN";
        document.getElementById("name-display").innerText = user.toUpperCase();

        // Efek Typing
        const textElement = document.getElementById("typing-text");
        const words = ["Software Developer", "Minecraft Miner", "Silent Worker", "Tester Website"];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                textElement.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentWord.length) {
                isDeleting = true;
                typeSpeed = 2000; // Diem bentar pas kata lengkap
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        type();
    </script>
</body>
</html>
