<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Clicker V3.8 - Millionaire Quest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0b0b; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        /* Progress & Animations */
        .progress-container { width: 100%; max-width: 400px; background: #1a1a1a; height: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; overflow: hidden; }
        #p-bar { width: 0%; height: 100%; background: #007bff; transition: width 0.1s; }
        .progress-full { background: linear-gradient(90deg, #ff0000, #ffcc00, #00ff00, #007bff, #ff0000) !important; background-size: 200%; animation: rainbow 1s linear infinite; }
        @keyframes rainbow { 0%{background-position:0%} 100%{background-position:200%} }
        .shake { animation: shake-anim 0.1s infinite; }
        @keyframes shake-anim { 0% {transform: translate(2px,2px)} 50% {transform: translate(-2px,-2px)} }

        /* Game Card */
        .game-card { background: #121212; border: 2px solid #222; padding: 30px; border-radius: 25px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; }
        #score-val { font-size: 4.5rem; font-weight: 900; margin: 5px 0; transition: transform 0.05s; letter-spacing: -2px; }
        
        /* Rank Styling */
        #level-tag { font-size: 11px; font-weight: 800; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; padding: 5px 15px; border-radius: 20px; display: inline-block; background: #1a1a1a; }
        .lvl-rookie { color: #888; }
        .lvl-elite { color: #007bff; }
        .lvl-pro { color: #00ff00; }
        .lvl-god { color: #ffcc00; box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); }
        .lvl-eternal { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        .lvl-mythic { color: #ff3e3e; text-shadow: 0 0 15px #ff3e3e; animation: pulse 0.5s infinite alternate; }

        /* Achievement Banner */
        #achieve { position: fixed; top: 15%; background: #fff; color: #000; padding: 12px 25px; border-radius: 10px; font-weight: 900; transform: translateY(-200px); transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 100; border-left: 8px solid #ffcc00; }
        .show-achieve { transform: translateY(0) !important; }

        /* Leaderboard */
        .leaderboard { margin-top: 20px; background: #080808; padding: 15px; border-radius: 15px; border: 1px solid #151515; }
        .entry { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 12px; border-bottom: 1px solid #111; color: #888; }
        .rank-1 { color: #ffcc00 !important; font-weight: bold; border-left: 3px solid #ffcc00; padding-left: 10px !important; }
        
        .main-btn { width: 100%; padding: 18px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 0 #000; }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        .reset-btn { background: none; border: none; color: #222; font-size: 9px; cursor: pointer; margin-top: 15px; }
        @keyframes pulse { from {opacity: 0.8; transform: scale(1);} to {opacity: 1; transform: scale(1.05);} }
    </style>
</head>

            <div id="l-list">Connecting...</div>
        </div>

        <button onclick="changeIdentity()" class="reset-btn">[ RESET IDENTITY ]</button>
    </div>
