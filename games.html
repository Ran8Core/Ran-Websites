<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAN8CORE - Project Clicker</title>
    <style>
        :root { --main-clr: #00d1ff; --bg-clr: #0a0a0a; --card-clr: #161616; }
        body { background-color: var(--bg-clr); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; user-select: none; }
        
        .back-nav { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #555; font-size: 14px; z-index: 100; }
        .back-nav:hover { color: var(--main-clr); }

        .container { background: var(--card-clr); padding: 2rem; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; }
        .rank-tag { border: 1px solid #555; padding: 3px 12px; border-radius: 20px; font-size: 10px; color: #aaa; text-transform: uppercase; }
        h1 { font-size: 64px; margin: 15px 0; cursor: pointer; color: #fff; }
        
        .btn-click { background: none; border: 2px solid var(--main-clr); color: var(--main-clr); width: 100%; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; margin-bottom: 25px; transition: 0.1s; }
        .btn-click:active { transform: scale(0.96); background: var(--main-clr); color: #000; }
        
        .tabs { display: flex; background: #000; padding: 4px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 8px; font-size: 13px; color: #666; font-weight: bold; }
        .tab.active { background: #1a1a1a; color: var(--main-clr); }
        
        .list-container { text-align: left; max-height: 220px; overflow-y: auto; padding-right: 5px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1d1d1d; border-radius: 12px; margin-bottom: 10px; border: 1px solid #282828; }
        .item-name { font-weight: bold; font-size: 14px; }
        .item-price { color: var(--main-clr); font-size: 11px; }
        .btn-buy { background: var(--main-clr); border: none; color: #000; padding: 6px 14px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <a href="index.html" class="back-nav">← Back to Terminal</a>

    <div class="container" id="game-ui" style="display:none;">
        <span class="rank-tag" id="rank-display">Rank: Rookie</span>
        <h1 id="display-score">0</h1>
        <button class="btn-click" onclick="addScore()">EXECUTE PROCESS</button>

        <div class="tabs">
            <div id="nav-shop" class="tab active" onclick="showTab('shop')">Aura Shop</div>
            <div id="nav-rank" class="tab" onclick="showTab('rank')">Rankings</div>
        </div>

        <div id="shop-content" class="list-container">
            <div class="item">
                <div><span class="item-name">Blue Aura</span><span class="item-price">Cost: 1,000</span></div>
                <button class="btn-buy" onclick="buyAura('Blue', 1000)">BUY</button>
            </div>
            <div class="item">
                <div><span class="item-name">Void Aura</span><span class="item-price">Cost: 5,000</span></div>
                <button class="btn-buy" onclick="buyAura('Void', 5000)">BUY</button>
            </div>
        </div>
        <div id="rank-content" class="list-container" style="display:none;">Connecting...</div>
    </div>

    <script>
        const API = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/Sheet1";
        let score = 0;
        let myName = localStorage.getItem("ran8user");

        // LOGIN SYSTEM
        window.onload = function() {
            if(!myName) {
                myName = prompt("Masukan Username lo:");
                if(!myName) myName = "Guest_" + Math.floor(Math.random()*999);
                localStorage.setItem("ran8user", myName);
            }
            document.getElementById('game-ui').style.display = 'block';
            loadRankings();
        };

        function addScore() {
            score++;
            updateUI();
            if(score % 10 === 0) sync();
        }

        function updateUI() {
            document.getElementById('display-score').innerText = score.toLocaleString();
            let r = score > 100000 ? "Legendary" : score > 20000 ? "Elite" : score > 5000 ? "Veteran" : "Rookie";
            document.getElementById('rank-display').innerText = "Rank: " + r;
        }

        function buyAura(name, price) {
            if(score >= price) { score -= price; updateUI(); sync(); alert("Bought " + name); }
            else alert("Not enough CorePoints!");
        }

        async function sync() {
            try {
                await fetch(API, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ condition: { name: myName }, set: { score: score } })
                });
            } catch (e) {}
        }

        async function loadRankings() {
            const rankDiv = document.getElementById('rank-content');
            try {
                const response = await fetch(API);
                const data = await response.json();
                data.sort((a, b) => (b.score || 0) - (a.score || 0));
                
                let html = "";
                data.forEach((user, index) => {
                    html += `<div class="item" style="background:none; border:none; border-bottom:1px solid #222;">
                                <span>#${index + 1} ${user.name}</span>
                                <span style="color:var(--main-clr); font-weight:bold;">${Number(user.score).toLocaleString()}</span>
                             </div>`;
                });
                rankDiv.innerHTML = html || "No data.";

                const me = data.find(u => u.name === myName);
                if(me) { score = Number(me.score); updateUI(); }
            } catch (e) { rankDiv.innerHTML = "Sync Error."; }
        }

        function showTab(t) {
            document.getElementById('shop-content').style.display = (t === 'shop' ? 'block' : 'none');
            document.getElementById('rank-content').style.display = (t === 'rank' ? 'block' : 'none');
            document.getElementById('nav-shop').classList.toggle('active', t === 'shop');
            document.getElementById('nav-rank').classList.toggle('active', t === 'rank');
            if(t === 'rank') loadRankings();
        }

        // ADMIN CMD (Long Press Skor)
        let timer;
        const scoreEl = document.getElementById('display-score');
        scoreEl.addEventListener('mousedown', () => {
            timer = setTimeout(() => {
                let cmd = prompt("ADMIN CMD:\nadd [value] | set [value]");
                if(cmd) {
                    let p = cmd.split(" ");
                    if(p[0] === "add") score += parseInt(p[1]);
                    else if(p[0] === "set") score = parseInt(p[1]);
                    updateUI(); sync();
                }
            }, 1500);
        });
        scoreEl.addEventListener('mouseup', () => clearTimeout(timer));
    </script>
</body>
</html>
