<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Clicker - Leaderboard Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* PROGRESS BAR */
        .progress-container {
            width: 100%; max-width: 400px;
            background: #1a1a1a; height: 10px;
            border-radius: 10px; margin-bottom: 20px;
            border: 1px solid #333; overflow: hidden;
        }
        .progress-bar {
            width: 0%; height: 100%;
            background: #007bff; transition: width 0.1s;
        }
        .progress-full { background: linear-gradient(90deg, #ff0000, #00ff00, #007bff); background-size: 200%; animation: rainbow 1.5s linear infinite; }
        @keyframes rainbow { 0% {background-position: 0%} 100% {background-position: 200%} }

        /* GAME CARD */
        .game-card {
            background: #121212; border: 2px solid #222;
            padding: 30px; border-radius: 20px;
            text-align: center; width: 90%; max-width: 400px;
        }
        #score-val { font-size: 5rem; font-weight: 900; margin: 10px 0; }

        /* LEADERBOARD BOX */
        .leaderboard {
            margin-top: 20px; background: #0f0f0f;
            padding: 15px; border-radius: 12px;
            border: 1px solid #222; width: 100%;
        }
        .leaderboard h3 { font-size: 12px; color: #007bff; letter-spacing: 2px; margin-bottom: 10px; }
        .entry { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #1a1a1a; }
        .rank-1 { color: #ffcc00; font-weight: bold; }

        /* BUTTONS */
        .main-btn {
            width: 100%; padding: 15px; background: #1a1a1a;
            color: white; border: 1px solid #333; border-radius: 10px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .main-btn:hover { border-color: #007bff; color: #007bff; }
        .back-link { margin-top: 20px; display: block; color: #444; text-decoration: none; font-size: 11px; }

        /* SHAKE EFFECT */
        .shake { animation: shake-anim 0.1s infinite; }
        @keyframes shake-anim { 0% {transform: translate(2px,2px)} 50% {transform: translate(-2px,-2px)} }
    </style>
</head>
<body id="bg">

    <div style="font-size: 11px; color: #ffcc00; margin-bottom: 5px;">BEST RECORD: <span id="hs">0</span></div>
    
    <div class="progress-container">
        <div id="p-bar" class="progress-bar"></div>
    </div>

    <div class="game-card">
        <div id="score-val">0</div>
        <button class="main-btn" onclick="tap()">EXECUTE PROCESS</button>

        <div class="leaderboard">
            <h3>GLOBAL TOP 3 (DELAYED)</h3>
            <div id="l-list">
                <div class="entry rank-1"><span>1. Admin_Ran</span><span>999</span></div>
                <div class="entry"><span>2. Shena_Sugg</span><span>850</span></div>
                <div class="entry"><span>3. Guest_User</span><span>120</span></div>
            </div>
        </div>

        <a href="home.html" class="back-link">← TERMINATE SESSION</a>
    </div>

    <script>
        let score = 0;
        let highScore = localStorage.getItem('ran_hs') || 0;
        document.getElementById('hs').innerText = highScore;

        function tap() {
            score++;
            document.getElementById('score-val').innerText = score;

            // Progress Bar
            let p = score % 100;
            if(p === 0 && score !== 0) p = 100;
            document.getElementById('p-bar').style.width = p + "%";

            // High Score
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('ran_hs', highScore);
                document.getElementById('hs').innerText = highScore;
            }

            // Effect 100
            if(score % 100 === 0) {
                document.getElementById('p-bar').classList.add('progress-full');
                triggerCombo();
            } else if(score % 100 === 1) {
                document.getElementById('p-bar').classList.remove('progress-full');
            }
        }

        function triggerCombo() {
            document.getElementById('bg').classList.add('shake');
            document.getElementById('score-val').style.color = "#ffcc00";
            setTimeout(() => {
                document.getElementById('bg').classList.remove('shake');
                document.getElementById('score-val').style.color = "white";
            }, 1000);
        }

        // Simulasi Update Leaderboard (Delay 2 Menit)
        setInterval(() => {
            console.log("Fetching latest leaderboard data...");
            // Di sini nanti bisa ditaruh kode fetch dari Google Sheets
        }, 120000); 
    </script>
</body>
</html>
