<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAN8CORE - Games</title>
    <style>
        :root {
            --main-clr: #00d1ff;
            --bg-clr: #0a0a0a;
            --card-clr: #161616;
        }
        body {
            background-color: var(--bg-clr);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-clr);
            padding: 2rem;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .rank-tag {
            border: 1px solid #fff;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            text-transform: uppercase;
        }
        h1 { font-size: 60px; margin: 10px 0; }
        .btn-click {
            background: none;
            border: 2px solid var(--main-clr);
            color: white;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .btn-click:active { transform: scale(0.95); background: var(--main-clr); }
        .tabs {
            display: flex;
            background: #000;
            padding: 5px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
        }
        .tab.active { background: #1a1a1a; color: var(--main-clr); border: 1px solid #333; }
        #rank-content { margin-top: 15px; text-align: left; max-height: 200px; overflow-y: auto; }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="rank-tag">Rank: Rookie</span>
        <h1 id="display-score">345</h1>

        <button class="btn-click" onclick="addScore()">EXECUTE PROCESS</button>

        <div class="tabs">
            <div id="nav-shop" class="tab" onclick="showTab('shop')">Aura Shop</div>
            <div id="nav-rank" class="tab active" onclick="showTab('rank')">Rankings</div>
        </div>

        <div id="shop-content" style="display:none;">
            <p style="margin-top:20px; color:#777;">Coming Soon...</p>
        </div>

        <div id="rank-content">
            Syncing...
        </div>
    </div>

    <script>
        // CONFIG - Pastiin Sheet1 sesuai nama tab di Google Sheets lo!
        const API = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/Sheet1";
        let score = 345;
        let myName = "Admin_Ran";

        function addScore() {
            score++;
            document.getElementById('display-score').innerText = score;
            // Tiap 10 klik otomatis sync biar nggak berat
            if(score % 10 === 0) sync();
        }

        async function sync() {
            try {
                await fetch(API, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        condition: { name: myName }, 
                        set: { score: score } 
                    })
                });
                console.log("Data synced!");
            } catch (e) { console.error("Sync Error"); }
        }

        async function loadRankings() {
            const rankDiv = document.getElementById('rank-content');
            try {
                const response = await fetch(API);
                const data = await response.json();
                
                // Urutin dari skor paling dewa
                data.sort((a, b) => (b.score || 0) - (a.score || 0));

                let html = "";
                data.forEach((user, index) => {
                    html += `
                        <div class="rank-item">
                            <span>#${index + 1} ${user.name}</span>
                            <span style="color:var(--main-clr)">${Number(user.score).toLocaleString()}</span>
                        </div>`;
                });
                rankDiv.innerHTML = html || "No data available";
            } catch (e) {
                rankDiv.innerHTML = "Failed to sync rankings.";
            }
        }

        function showTab(t) {
            const shop = document.getElementById('shop-content');
            const rank = document.getElementById('rank-content');
            const nShop = document.getElementById('nav-shop');
            const nRank = document.getElementById('nav-rank');

            if(t === 'rank') {
                shop.style.display = 'none';
                rank.style.display = 'block';
                nRank.classList.add('active');
                nShop.classList.remove('active');
                loadRankings();
            } else {
                shop.style.display = 'block';
                rank.style.display = 'none';
                nShop.classList.add('active');
                nRank.classList.remove('active');
            }
        }

        // Jalankan saat pertama kali buka
        window.onload = loadRankings;
    </script>
</body>
</html>
