<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Clicker V3.6 - Leveling System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0b0b; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        /* Progress & Animations */
        .progress-container { width: 100%; max-width: 400px; background: #1a1a1a; height: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; overflow: hidden; }
        #p-bar { width: 0%; height: 100%; background: #007bff; transition: width 0.1s; }
        .progress-full { background: linear-gradient(90deg, #ff0000, #ffcc00, #00ff00, #007bff, #ff0000) !important; background-size: 200%; animation: rainbow 1s linear infinite; }
        @keyframes rainbow { 0%{background-position:0%} 100%{background-position:200%} }
        .shake { animation: shake-anim 0.1s infinite; }
        @keyframes shake-anim { 0% {transform: translate(2px,2px)} 50% {transform: translate(-2px,-2px)} }

        /* Game Card */
        .game-card { background: #121212; border: 2px solid #222; padding: 30px; border-radius: 25px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        #score-val { font-size: 5rem; font-weight: 900; margin: 5px 0; transition: transform 0.05s; }
        
        /* Level Styling */
        #level-tag { font-size: 11px; font-weight: 800; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; padding: 5px 15px; border-radius: 20px; display: inline-block; background: #1a1a1a; color: #555; }
        .lvl-rookie { color: #888 !important; }
        .lvl-elite { color: #007bff !important; box-shadow: 0 0 10px rgba(0, 123, 255, 0.2); }
        .lvl-pro { color: #00ff00 !important; box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); }
        .lvl-god { color: #ffcc00 !important; box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); animation: pulse 1s infinite alternate; }
        @keyframes pulse { from {opacity: 0.7} to {opacity: 1} }

        /* Leaderboard Style */
        .leaderboard { margin-top: 20px; background: #080808; padding: 15px; border-radius: 15px; border: 1px solid #151515; }
        .entry { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 12px; border-bottom: 1px solid #111; color: #888; text-align: left; }
        .rank-1 { color: #ffcc00 !important; font-weight: bold; border-left: 3px solid #ffcc00; padding-left: 10px !important; }
        
        .main-btn { width: 100%; padding: 18px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 0 #000; }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        .reset-btn { background: none; border: none; color: #222; font-size: 9px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body id="bg">

    <div style="font-size: 10px; color: #ffcc00; letter-spacing: 2px; margin-bottom: 8px;">HIGHSCORE: <span id="hs">0</span></div>
    <div class="progress-container"><div id="p-bar"></div></div>

    <div class="game-card">
        <div id="level-tag" class="lvl-rookie">RANK: ROOKIE</div>
        <div id="score-val">0</div>
        <button class="main-btn" onclick="tap()">Execute Process</button>
        
        <div class="leaderboard">
            <h3 style="font-size: 10px; color: #444; margin-bottom: 10px; letter-spacing: 1px;">TOP AGENTS</h3>
            <div id="l-list">Connecting...</div>
        </div>

        <button onclick="changeIdentity()" class="reset-btn">[ RESET IDENTITY ]</button>
    </div>

    <script>
        const API_URL = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/Sheet1";
        let score = 0;
        let playerName = localStorage.getItem('ran_name');
        let highScore = parseInt(localStorage.getItem('ran_hs')) || 0;

        if (!playerName) {
            playerName = prompt("Input Nickname:") || "Agent_" + Math.floor(Math.random()*99);
            localStorage.setItem('ran_name', playerName);
        }

        document.getElementById('hs').innerText = highScore;

        function tap() {
            score++;
            updateUI();
            
            if (score % 100 === 0) triggerCombo();
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('ran_hs', highScore);
                document.getElementById('hs').innerText = highScore;
            }
            if (score % 20 === 0) updateDB();
        }

        function updateUI() {
            const sVal = document.getElementById('score-val');
            sVal.innerText = score;
            sVal.style.transform = "scale(1.1)";
            setTimeout(() => sVal.style.transform = "scale(1)", 50);

            // LEVEL SYSTEM LOGIC
            const tag = document.getElementById('level-tag');
            if (score >= 5000) {
                tag.innerText = "RANK: ETERNAL";
                tag.className = "lvl-god";
            } else if (score >= 1000) {
                tag.innerText = "RANK: CLICKER GOD";
                tag.className = "lvl-god";
            } else if (score >= 500) {
                tag.innerText = "RANK: PRO AGENT";
                tag.className = "lvl-pro";
            } else if (score >= 100) {
                tag.innerText = "RANK: ELITE";
                tag.className = "lvl-elite";
            } else {
                tag.innerText = "RANK: ROOKIE";
                tag.className = "lvl-rookie";
            }

            let p = score % 100;
            if (p === 0 && score !== 0) p = 100;
            document.getElementById('p-bar').style.width = p + "%";
        }

        function triggerCombo() {
            document.getElementById('bg').classList.add('shake');
            document.getElementById('p-bar').classList.add('progress-full');
            setTimeout(() => {
                document.getElementById('bg').classList.remove('shake');
                document.getElementById('p-bar').classList.remove('progress-full');
            }, 1200);
        }

        function updateDB() {
            fetch(API_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    condition: { name: playerName },
                    set: { score: score }
                })
            }).then(res => res.json()).then(data => {
                if (data.updatedRows === 0) {
                    fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify([{ name: playerName, score: score }])
                    });
                }
            });
        }

        function getLeaderboard() {
            fetch(API_URL).then(res => res.json()).then(data => {
                if (Array.isArray(data)) {
                    let filtered = data.filter(i => i.name && i.name !== "null");
                    filtered.sort((a, b) => parseInt(b.score || 0) - parseInt(a.score || 0));
                    let html = '';
                    filtered.slice(0, 3).forEach((p, i) => {
                        html += `<div class="entry ${i===0?'rank-1':''}">
                                    <span>${i+1}. ${p.name}</span>
                                    <span>${p.score}</span>
                                 </div>`;
                        if (p.name === playerName && score < parseInt(p.score)) {
                            score = parseInt(p.score);
                            updateUI();
                        }
                    });
                    document.getElementById('l-list').innerHTML = html || "No Data";
                }
            });
        }

        function changeIdentity() {
            if(confirm("Reset nickname?")) {
                localStorage.removeItem('ran_name');
                location.reload();
            }
        }

        getLeaderboard();
        setInterval(getLeaderboard, 15000); 
    </script>
</body>
</html>
