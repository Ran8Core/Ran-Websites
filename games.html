        #milestone-pop { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: rgba(0,0,0,0.95); border: 3px solid var(--main-clr); padding: 40px; border-radius: 30px; text-align: center; z-index: 1000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 60px var(--main-clr); min-width: 300px; }

        .main-btn:active { transform: scale(0.95); background: var(--main-clr); }

        .skin-btn { height: 40px; border-radius: 10px; border: 2px solid #333; cursor: pointer; position: relative; }
        .skin-btn.owned::before { content: 'OWNED'; position: absolute; top: -14px; left: 0; width: 100%; font-size: 7px; color: #00ff00; font-weight: 900; }
        #admin-console { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); border: 1px solid #00ff00; padding: 12px; border-radius: 10px; display: none; width: 320px; z-index: 100; }
        #console-input { width: 100%; background: transparent; border: none; color: #00ff00; font-family: monospace; outline: none; }
    </style>
</head>
