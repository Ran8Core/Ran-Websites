<div class="tab-container" style="margin-top: 15px;">
    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
        <button onclick="showTab('shop')" class="tab-btn">Aura Shop</button>
        <button onclick="showTab('leader')" class="tab-btn">Rankings</button>
    </div>

    <div id="shop-content" class="tab-content">
        <div class="skin-grid">
            </div>
    </div>

    <div id="leader-content" class="tab-content" style="display: none;">
        <div id="l-list" style="font-size: 11px;">Syncing...</div>
    </div>
</div>

<style>
    .tab-btn { flex: 1; padding: 5px; font-size: 9px; background: #1a1a1a; color: #555; border: 1px solid #222; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
    .tab-btn:hover { color: #fff; }
    .active-tab { border-color: var(--main-clr); color: var(--main-clr); }
</style>

<script>
    function showTab(type) {
        document.getElementById('shop-content').style.display = type === 'shop' ? 'block' : 'none';
        document.getElementById('leader-content').style.display = type === 'leader' ? 'block' : 'none';
    }
</script>
