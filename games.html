<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAN8CORE - Clicker</title>
    <style>
        :root { --main-clr: #00d1ff; --bg-clr: #0a0a0a; --card-clr: #161616; }
        body { background-color: var(--bg-clr); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; user-select: none; }
        .back-nav { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #555; font-size: 14px; z-index: 999; border: 1px solid #333; padding: 5px 10px; border-radius: 5px; }
        .container { background: var(--card-clr); padding: 2rem; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #333; display: none; }
        .user-tag { border: 1px solid #555; padding: 3px 12px; border-radius: 20px; font-size: 11px; color: var(--main-clr); }
        h1 { font-size: 64px; margin: 15px 0; color: #fff; cursor: pointer; }
        .btn-click { background: none; border: 2px solid var(--main-clr); color: var(--main-clr); width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .tabs { display: flex; background: #000; padding: 4px; border-radius: 12px; margin: 20px 0 15px 0; }
        .tab { flex: 1; padding: 10px; cursor: pointer; font-size: 12px; color: #666; }
        .tab.active { background: #1a1a1a; color: var(--main-clr); }
        .list-container { text-align: left; max-height: 200px; overflow-y: auto; }
        .item { display: flex; justify-content: space-between; padding: 10px; background: #1d1d1d; border-radius: 10px; margin-bottom: 5px; font-size: 13px; }
    </style>
</head>
<body>

<a href="home.html" class="back-nav">← TERMINAL</a>

<div class="container" id="game-ui">
    <span class="user-tag" id="user-display">COMMANDER: ...</span>
    <h1 id="display-score">0</h1>
    <button class="btn-click" onclick="addScore()">EXECUTE</button>

    <div class="tabs">
        <div id="nav-shop" class="tab active" onclick="showTab('shop')">Shop</div>
        <div id="nav-rank" class="tab" onclick="showTab('rank')">Rank</div>
    </div>

    <div id="shop-content" class="list-container">
        <div class="item"><span>Core Booster</span><button onclick="alert('Soon!')">BUY</button></div>
    </div>
    <div id="rank-content" class="list-container" style="display:none;">Loading...</div>
</div>

<script>
    const SCORE_API = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/Sheet1";
    let score = 0;
    let myName = localStorage.getItem("ran8user");

    window.onload = async function() {
        if(!myName) {
            window.location.href = "index.html"; // Tendang kalau belum login
            return;
        }
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('user-display').innerText = "COMMANDER: " + myName.toUpperCase();
        
        try {
            const res = await fetch(SCORE_API);
            const data = await res.json();
            const me = data.find(u => u.name === myName);
            if(me) { score = Number(me.score); updateUI(); }
        } catch(e) {}
        loadRankings();
    };

    function addScore() {
        score++;
        updateUI();
        if(score % 10 === 0) sync();
    }

    function updateUI() {
        document.getElementById('display-score').innerText = score.toLocaleString();
    }

    async function sync() {
        try {
            await fetch(SCORE_API, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ condition: { name: myName }, set: { score: score } })
            });
        } catch (e) {}
    }

    async function loadRankings() {
        const rankDiv = document.getElementById('rank-content');
        try {
            const response = await fetch(SCORE_API);
            const data = await response.json();
            data.sort((a, b) => (b.score || 0) - (a.score || 0));
            let html = "";
            data.forEach((u, i) => {
                html += `<div class="item"><span>#${i+1} ${u.name}</span><b>${Number(u.score).toLocaleString()}</b></div>`;
            });
            rankDiv.innerHTML = html;
        } catch (e) { rankDiv.innerHTML = "Error Sync"; }
    }

    function showTab(t) {
        document.getElementById('shop-content').style.display = (t === 'shop' ? 'block' : 'none');
        document.getElementById('rank-content').style.display = (t === 'rank' ? 'block' : 'none');
        document.getElementById('nav-shop').classList.toggle('active', t === 'shop');
        document.getElementById('nav-rank').classList.toggle('active', t === 'rank');
        if(t === 'rank') loadRankings();
    }
</script>
</body>
</html>
