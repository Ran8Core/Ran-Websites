<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAN8CORE - Project Clicker</title>
    <style>
        :root { --main-clr: #00d1ff; --bg-clr: #0a0a0a; --card-clr: #161616; }
        body { background-color: var(--bg-clr); color: white; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; user-select: none; }
        
        .back-nav { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #555; font-size: 12px; border: 1px solid #333; padding: 5px 10px; border-radius: 5px; transition: 0.3s; }
        .back-nav:hover { color: var(--main-clr); border-color: var(--main-clr); }

        .container { background: var(--card-clr); padding: 2rem; border-radius: 20px; width: 340px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .user-tag { border: 1px solid #444; padding: 4px 15px; border-radius: 20px; font-size: 10px; color: var(--main-clr); letter-spacing: 1px; }
        
        h1 { font-size: 72px; margin: 20px 0; color: #fff; text-shadow: 0 0 20px rgba(0, 209, 255, 0.3); }
        
        .btn-click { background: transparent; border: 2px solid var(--main-clr); color: var(--main-clr); width: 100%; padding: 20px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; box-shadow: inset 0 0 0 0 var(--main-clr); }
        .btn-click:active { transform: scale(0.95); background: var(--main-clr); color: #000; }

        .tabs { display: flex; background: #000; padding: 5px; border-radius: 12px; margin: 25px 0 15px 0; border: 1px solid #222; }
        .tab { flex: 1; padding: 10px; cursor: pointer; font-size: 12px; color: #555; transition: 0.3s; font-weight: bold; }
        .tab.active { background: #1a1a1a; color: var(--main-clr); border-radius: 8px; }

        .list-container { text-align: left; max-height: 220px; overflow-y: auto; padding-right: 5px; }
        .list-container::-webkit-scrollbar { width: 4px; }
        .list-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #0f0f0f; border-radius: 10px; margin-bottom: 8px; font-size: 13px; border: 1px solid #222; }
        .item b { color: var(--main-clr); }
        .item button { background: #222; border: none; color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; }
        
        #sync-msg { font-size: 9px; color: #444; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<a href="home.html" class="back-nav">← SYSTEM_TERMINAL</a>

<div class="container">
    <span class="user-tag" id="user-display">COMMANDER: LOADING...</span>
    <h1 id="display-score">0</h1>
    <button class="btn-click" onclick="addScore()">EXECUTE CLICK</button>

    <div class="tabs">
        <div id="nav-shop" class="tab active" onclick="showTab('shop')">UPGRADES</div>
        <div id="nav-rank" class="tab" onclick="showTab('rank')">RANKING</div>
    </div>

    <div id="shop-content" class="list-container">
        <div class="item">
            <div><span>Core Overclock</span><br><small style="color:#555">Soon!</small></div>
            <button disabled>LOCKED</button>
        </div>
        <div class="item">
            <div><span>Auto-Bot v1</span><br><small style="color:#555">Soon!</small></div>
            <button disabled>LOCKED</button>
        </div>
    </div>

    <div id="rank-content" class="list-container" style="display:none;">
        <div style="color:#444; text-align:center; padding:20px;">Fetching global data...</div>
    </div>

    <div id="sync-msg">DB_STATUS: IDLE</div>
</div>

<script>
    const GAME_API = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/Sheet1";
    let score = 0;
    let myName = localStorage.getItem("ran8user");
    let isUserExist = false; 

    window.onload = async function() {
        if(!myName) {
            window.location.href = "index.html";
            return;
        }
        document.getElementById('user-display').innerText = "COMMANDER: " + myName.toUpperCase();
        
        try {
            const res = await fetch(GAME_API);
            const data = await res.json();
            const me = data.find(u => u.name && u.name.toString().toLowerCase() === myName.toLowerCase());
            
            if(me) { 
                score = parseInt(me.score) || 0; 
                isUserExist = true; 
                updateUI(); 
            } else {
                isUserExist = false; 
            }
        } catch(e) { console.error("Initial Load Error:", e); }
        loadRankings();
    };

    function addScore() {
        score++;
        updateUI();
        if(score % 10 === 0) sync();
    }

    function updateUI() {
        document.getElementById('display-score').innerText = score.toLocaleString();
    }

    async function sync() {
        const msg = document.getElementById('sync-msg');
        msg.innerText = "DB_STATUS: SYNCING...";
        
        try {
            let response;
            if (isUserExist) {
                // Update skor user lama
                response = await fetch(GAME_API, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        condition: { name: myName }, 
                        set: { score: score } 
                    })
                });
            } else {
                // Daftar akun baru (POST)
                response = await fetch(GAME_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify([{ 
                        name: myName, 
                        score: score 
                    }])
                });
                if(response.ok) isUserExist = true;
            }

            if(response.ok) {
                msg.innerText = "DB_STATUS: SAVED";
                setTimeout(() => { msg.innerText = "DB_STATUS: IDLE"; }, 1500);
            } else {
                msg.innerText = "DB_STATUS: FAILED";
            }
        } catch (e) { msg.innerText = "DB_STATUS: ERROR"; }
    }

    async function loadRankings() {
        const rankDiv = document.getElementById('rank-content');
        try {
            const response = await fetch(GAME_API + "?t=" + new Date().getTime());
            const data = await response.json();
            
            data.sort((a, b) => (parseInt(b.score) || 0) - (parseInt(a.score) || 0));
            
            let html = "";
            data.forEach((u, i) => {
                const isMeStyle = u.name && u.name.toString().toLowerCase() === myName.toLowerCase() 
                                  ? "border:1px solid var(--main-clr); background: #1a1a1a;" 
                                  : "";
                html += `
                <div class="item" style="${isMeStyle}">
                    <span>#${i+1} ${u.name || 'Unknown'}</span>
                    <b>${(parseInt(u.score) || 0).toLocaleString()}</b>
                </div>`;
            });
            rankDiv.innerHTML = html;
        } catch (e) { rankDiv.innerHTML = "<div style='text-align:center; color:red;'>Sync Error</div>"; }
    }

    function showTab(t) {
        document.getElementById('shop-content').style.display = (t === 'shop' ? 'block' : 'none');
        document.getElementById('rank-content').style.display = (t === 'rank' ? 'block' : 'none');
        document.getElementById('nav-shop').classList.toggle('active', t === 'shop');
        document.getElementById('nav-rank').classList.toggle('active', t === 'rank');
        if(t === 'rank') loadRankings();
    }
</script>
</body>
</html>
