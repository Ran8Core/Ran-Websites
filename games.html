<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Clicker - Ran 8Core</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            flex-direction: column;
            transition: background 0.3s;
        }

        /* SCREEN SHAKE ANIMATION */
        .ultra-shake {
            animation: shake-anim 0.1s infinite;
        }
        @keyframes shake-anim {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(0,0); }
        }

        /* PROGRESS BAR CONTAINER */
        .progress-container {
            width: 100%;
            max-width: 400px;
            background: #1a1a1a;
            height: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #007bff;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.7);
            transition: width 0.1s ease;
        }

        /* FULL PROGRESS GLOW */
        .progress-full {
            background: linear-gradient(90deg, #ff0000, #ffcc00, #00ff00, #007bff, #ff0000);
            background-size: 200%;
            animation: rainbow 2s linear infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0%; }
            100% { background-position: 200%; }
        }

        /* GAME CARD */
        .game-card {
            background: #121212;
            border: 2px solid #222;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            max-width: 450px;
            width: 90%;
            position: relative;
        }

        h2 {
            font-size: 10px;
            color: #555;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        #score-val {
            font-size: 5.5rem;
            font-weight: 900;
            margin: 15px 0;
            transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* BUTTON CLICKER */
        .main-btn {
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #000;
        }

        .main-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #000;
        }

        .main-btn:hover {
            border-color: #007bff;
            color: #007bff;
        }

        /* FOOTER & BACK */
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #444;
            text-decoration: none;
            font-size: 11px;
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .back-link:hover { color: #fff; background: rgba(255,255,255,0.05); }

        .system-footer {
            position: fixed;
            bottom: 10px;
            font-family: monospace;
            font-size: 9px;
            color: #222;
        }
    </style>
</head>
<body id="bg">

    <div class="progress-container">
        <div id="p-bar" class="progress-bar"></div>
    </div>

    <div class="game-card" id="card">
        <h2>System Processor</h2>
        <div id="score-val">0</div>
        
        <button class="main-btn" onclick="tap()">Execute Process</button>
        
        <a href="home.html" class="back-link">← TERMINATE_SESSION</a>
    </div>

    <div class="system-footer">
        STATUS: ONLINE | NODE: RAN_8CORE | VAR: SHENA_GAME_v2
    </div>

    <script>
        let score = 0;
        const scoreText = document.getElementById('score-val');
        const pBar = document.getElementById('p-bar');
        const bg = document.getElementById('bg');

        function tap() {
            score++;
            scoreText.innerText = score;

            // 1. Progress Bar Logic (0-100)
            let progress = score % 100;
            if (progress === 0 && score !== 0) progress = 100;
            
            pBar.style.width = progress + "%";

            // 2. Click Animation (Scale)
            scoreText.style.transform = "scale(1.2)";
            setTimeout(() => scoreText.style.transform = "scale(1)", 100);

            // 3. Ultra Combo (Kelipatan 100)
            if (score % 100 === 0) {
                pBar.classList.add('progress-full');
                triggerCombo();
            } else {
                pBar.classList.remove('progress-full');
            }
        }

        function triggerCombo() {
            // Layar Getar
            bg.classList.add('ultra-shake');
            scoreText.style.color = "#ffcc00";
            scoreText.style.textShadow = "0 0 40px #ffcc00";
            bg.style.background = "#1a1500";

            setTimeout(() => {
                bg.classList.remove('ultra-shake');
                bg.style.background = "#0b0b0b";
                scoreText.style.color = "#ffffff";
                scoreText.style.textShadow = "none";
            }, 1000);
        }
    </script>
</body>
</html>
