<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Engine | RAN8CORE</title>
    <style>
        :root { --main-clr: #007bff; --bg-glow: rgba(0, 123, 255, 0.15); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background-color: #050505; 
            background-image: radial-gradient(circle at center, var(--bg-glow) 0%, #050505 70%);
            color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden;
        }

        .back-nav {
            position: fixed; top: 20px; left: 20px; text-decoration: none; color: #555; 
            font-size: 11px; font-weight: 900; border: 1px solid #222; padding: 8px 15px; 
            border-radius: 10px; background: rgba(0,0,0,0.3); transition: 0.3s;
        }
        .back-nav:hover { color: var(--main-clr); border-color: var(--main-clr); box-shadow: 0 0 15px var(--main-clr); }

        .game-card { 
            background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(15px); 
            border: 2px solid #222; padding: 25px; border-radius: 25px; 
            text-align: center; width: 100%; max-width: 450px; position: relative;
        }

        #score-val { font-size: 4rem; font-weight: 900; margin: 10px 0; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .main-btn { width: 100%; padding: 20px; background: #1a1a1a; color: white; border: 1px solid var(--main-clr); border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; }
        .main-btn:active { transform: scale(0.98); background: var(--main-clr); }

        .tab-box { width: 100%; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; border: 1px solid #333; }
        .tab-nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; font-size: 11px; background: #151515; color: #555; border: 1px solid #333; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { border-color: var(--main-clr); color: var(--main-clr); }

        .skin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .skin-btn { height: 45px; border-radius: 10px; border: 2px solid #333; cursor: pointer; position: relative; }
        .skin-btn.owned::after { content: 'OWN'; position: absolute; bottom: -12px; left: 0; width: 100%; font-size: 7px; color: #00ff00; text-align: center; font-weight: 900; }

        #level-tag { transition: 0.5s; margin-bottom: 15px; display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 10px; border: 1px solid; }
        
        #admin-console { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid #00ff00; padding: 10px; display: none; width: 300px; }
        #console-input { width: 100%; background: transparent; border: none; color: #00ff00; font-family: monospace; outline: none; }
    </style>
</head>
<body>

    <a href="home.html" class="back-nav">← EXIT TO HOME</a>

    <div id="admin-console"><input type="text" id="console-input" placeholder="root@admin:~#"></div>

    <div class="game-card">
        <div id="level-tag">RANK: ROOKIE</div>
        <div id="score-val" onclick="toggleConsole()">0</div>
        <button class="main-btn" onclick="tap()">Execute Process</button>
        
        <div class="tab-box">
            <div class="tab-nav">
                <button id="nav-shop" onclick="showTab('shop')" class="tab-btn active">Aura Shop</button>
                <button id="nav-rank" onclick="showTab('rank')" class="tab-btn">Rankings</button>
            </div>
            <div id="shop-content">
                <div class="skin-grid">
                    <div id="skin-0" class="skin-btn" style="background:#007bff;" onclick="handleSkin('#007bff', 0, 0)"></div>
                    <div id="skin-1" class="skin-btn" style="background:#ff3e3e;" onclick="handleSkin('#ff3e3e', 500, 1)"></div>
                    <div id="skin-2" class="skin-btn" style="background:#00ff00;" onclick="handleSkin('#00ff00', 1500, 2)"></div>
                    <div id="skin-3" class="skin-btn" style="background:#ff00ff;" onclick="handleSkin('#ff00ff', 5000, 3)"></div>
                    <div id="skin-4" class="skin-btn" style="background:#ffcc00;" onclick="handleSkin('#ffcc00', 10000, 4)"></div>
                    <div id="skin-5" class="skin-btn" style="background:#ffffff;" onclick="handleSkin('#ffffff', 25000, 5)"></div>
                </div>
            </div>
            <div id="rank-content" style="display: none;"><div id="leader-list" style="font-size: 11px; color:#555;">Syncing...</div></div>
        </div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('ran_score')) || 0;
        let ownedSkins = JSON.parse(localStorage.getItem('ran_skins')) || [0];
        const API = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/Sheet1";

        function tap() { score++; updateUI(); save(); if(score % 50 === 0) sync(); }
        function save() { localStorage.setItem('ran_score', score); }

        function showTab(t) {
            document.getElementById('shop-content').style.display = t === 'shop' ? 'block' : 'none';
            document.getElementById('rank-content').style.display = t === 'rank' ? 'block' : 'none';
            document.getElementById('nav-shop').classList.toggle('active', t === 'shop');
            document.getElementById('nav-rank').classList.toggle('active', t === 'rank');
        }

        function handleSkin(c, p, i) {
            if(ownedSkins.includes(i)) { setSkin(c); }
            else if(score >= p) { score -= p; ownedSkins.push(i); localStorage.setItem('ran_skins', JSON.stringify(ownedSkins)); setSkin(c); updateUI(); }
        }

        function setSkin(c) { 
            document.documentElement.style.setProperty('--main-clr', c); 
            document.documentElement.style.setProperty('--bg-glow', c + "26");
            updateUI(); 
        }

        function toggleConsole() { 
            let c = document.getElementById('admin-console');
            c.style.display = c.style.display === 'block' ? 'none' : 'block';
            if(c.style.display === 'block') document.getElementById('console-input').focus();
        }

        function updateUI() {
            const sd = document.getElementById('score-val');
            sd.innerText = score.toLocaleString();
            if(score >= 1000000000000) sd.style.fontSize = "2.2rem";
            else if(score >= 1000000000) sd.style.fontSize = "2.8rem";
            else sd.style.fontSize = "4rem";

            const tag = document.getElementById('level-tag');
            tag.style.boxShadow = "none";
            if (score >= 1000000000000) { 
                tag.innerText = "RANK: CORE SYSTEM OVERLORD"; tag.style.color = "#fff"; 
                tag.style.boxShadow = "0 0 20px #fff, 0 0 40px #00ffff";
                sd.style.textShadow = "0 0 20px #00ffff";
            } else if (score >= 999999000) { 
                tag.innerText = "RANK: THE CORE"; tag.style.color = "#ff0000"; 
                tag.style.boxShadow = "0 0 15px #ff0000";
                sd.style.textShadow = "0 0 20px #ff0000";
            } else { tag.innerText = "RANK: ROOKIE"; tag.style.color = "#fff"; sd.style.textShadow = "none"; }
            
            ownedSkins.forEach(i => document.getElementById('skin-'+i)?.classList.add('owned'));
        }

        function sync() {
            fetch(API, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ condition: { name: "Admin_Ran" }, set: { score: score } }) });
        }

        updateUI();
    </script>
</body>
</html>
