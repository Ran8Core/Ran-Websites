<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Station - Ran</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            flex-direction: column;
            transition: background 0.3s;
        }

        /* EFEK SCREEN SHAKE UNTUK KELIPATAN 100 */
        .ultra-shake {
            animation: ultra-shake-anim 0.5s infinite;
        }

        @keyframes ultra-shake-anim {
            0% { transform: translate(0,0) rotate(0); }
            25% { transform: translate(5px, 5px) rotate(2deg); }
            50% { transform: translate(-5px, -5px) rotate(-2deg); }
            75% { transform: translate(5px, -5px) rotate(2deg); }
            100% { transform: translate(0,0) rotate(0); }
        }

        /* CONTAINER */
        .game-card {
            background: rgba(18, 18, 18, 0.9);
            border: 2px solid #222;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            max-width: 450px;
            width: 90%;
            z-index: 10;
            position: relative;
        }

        h2 {
            font-size: 12px;
            color: #007bff;
            letter-spacing: 5px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .high-score {
            font-size: 10px;
            color: #555;
            margin-bottom: 20px;
        }

        /* SCORE DISPLAY */
        #score-val {
            font-size: 6rem;
            font-weight: bold;
            color: #ffffff;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transition: 0.1s;
        }

        /* BUTTON CLICKER */
        .click-btn {
            background: linear-gradient(145deg, #1a1a1a, #111);
            color: white;
            border: 1px solid #333;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 5px 0 #000;
        }

        .click-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #000;
        }

        .click-btn:hover {
            border-color: #007bff;
            color: #007bff;
        }

        /* BACK BUTTON */
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #444;
            text-decoration: none;
            font-size: 12px;
            padding: 10px 20px;
            border: 1px solid transparent;
            border-radius: 20px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #fff;
            border-color: #333;
        }

        /* SYSTEM INFO */
        .footer-info {
            position: fixed;
            bottom: 10px;
            font-family: monospace;
            font-size: 9px;
            color: #333;
        }
    </style>
</head>
<body id="game-body">

    <div class="game-card" id="card">
        <h2>CORE CLICKER</h2>
        <div class="high-score">BEST RECORD: <span id="high-score-val">0</span></div>
        
        <div id="score-val">0</div>
        
        <button class="click-btn" id="main-button" onclick="handleTap()">TAP TO PROCESS</button>
        
        <a href="home.html" class="back-link">← TERMINATE SESSION</a>
    </div>

    <div class="footer-info">
        CPU_LOAD: STABLE | NODE: RAN_8CORE | VAR: SHENA_SUGGESTION
    </div>

    <script>
        let score = 0;
        let highScore = localStorage.getItem('ranHighScore') || 0;
        document.getElementById('high-score-val').innerText = highScore;

        const scoreText = document.getElementById('score-val');
        const body = document.getElementById('game-body');
        const card = document.getElementById('card');

        function handleTap() {
            score++;
            scoreText.innerText = score;

            // Update High Score
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('ranHighScore', highScore);
                document.getElementById('high-score-val').innerText = highScore;
            }

            // EFEK STANDAR (Setiap Klik)
            scoreText.style.transform = "scale(1.1)";
            setTimeout(() => scoreText.style.transform = "scale(1)", 100);

            // EFEK KELIPATAN 10 (Glow Biru)
            if(score % 10 === 0 && score % 100 !== 0) {
                scoreText.style.color = "#007bff";
                scoreText.style.textShadow = "0 0 30px #007bff";
                setTimeout(() => {
                    scoreText.style.color = "#ffffff";
                    scoreText.style.textShadow = "none";
                }, 300);
            }

            // EFEK KELIPATAN 100 (SUPER COMBO)
            if(score % 100 === 0) {
                triggerUltraCombo();
            }
        }

        function triggerUltraCombo() {
            // 1. Warna Emas Berkilau
            scoreText.style.color = "#ffcc00";
            scoreText.style.textShadow = "0 0 50px #ffcc00";
            
            // 2. Screen Shake
            body.classList.add('ultra-shake');
            
            // 3. Background Flash
            body.style.background = "#1a1500";

            setTimeout(() => {
                body.classList.remove('ultra-shake');
                body.style.background = "#0b0b0b";
                scoreText.style.color = "#ffffff";
                scoreText.style.textShadow = "none";
            }, 1000);
        }
    </script>
</body>
</html>
