<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAN8CORE - Game</title>
    <style>
        :root { --main-clr: #00d1ff; --bg-clr: #0a0a0a; }
        body { background-color: var(--bg-clr); color: white; font-family: 'Consolas', monospace; text-align: center; margin: 0; padding-top: 50px; }
        .container { background: #161616; padding: 20px; border-radius: 15px; display: inline-block; border: 1px solid #333; min-width: 250px; }
        h1 { font-size: 48px; margin: 10px 0; color: var(--main-clr); }
        button { background: var(--main-clr); border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 10px; width: 100%; }
        .user-info { font-size: 12px; color: #888; margin-bottom: 10px; }
        .nav-back { position: absolute; top: 20px; left: 20px; color: #555; text-decoration: none; font-size: 12px; border: 1px solid #333; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<a href="home.html" class="nav-back">← BACK TO TERMINAL</a>

<div class="container">
    <div class="user-info" id="user-display">COMMANDER: ...</div>
    <h1 id="score-display">0</h1>
    <button onclick="addScore()">EXECUTE CLICK</button>
    <p id="sync-status" style="font-size: 10px; color: #555; margin-top: 10px;">IDLE</p>
</div>

<script>
    // SESUAIKAN URL API LO (PASTIKAN AKHIRNYA Sheet1)
    const GAME_API = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/Sheet1";
    let score = 0;
    let myName = localStorage.getItem("ran8user");

    window.onload = async function() {
        if(!myName) {
            window.location.href = "index.html";
            return;
        }
        document.getElementById('user-display').innerText = "COMMANDER: " + myName.toUpperCase();
        loadData();
    };

    async function loadData() {
        try {
            const res = await fetch(GAME_API);
            const data = await res.json();
            // Cari skor berdasarkan nama user yang login
            const me = data.find(u => u.name && u.name.toString().toLowerCase() === myName.toLowerCase());
            if(me) {
                score = parseInt(me.score) || 0;
                updateUI();
            }
        } catch(e) { console.log("Load Error"); }
    }

    function addScore() {
        score++;
        updateUI();
        // Sinkron ke Sheets setiap 10 klik biar nggak berat
        if(score % 10 === 0) syncScore();
    }

    function updateUI() {
        document.getElementById('score-display').innerText = score;
    }

    async function syncScore() {
        const status = document.getElementById('sync-status');
        status.innerText = "SYNCING...";
        try {
            await fetch(GAME_API, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    condition: { name: myName },
                    set: { score: score }
                })
            });
            status.innerText = "SAVED";
            setTimeout(() => { status.innerText = "IDLE"; }, 1000);
        } catch(e) { status.innerText = "SYNC ERROR"; }
    }
</script>
</body>
</html>
