<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Clicker V4.1 | Shop Update</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0b0b; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .progress-container { width: 100%; max-width: 400px; background: #1a1a1a; height: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; overflow: hidden; }
        #p-bar { width: 0%; height: 100%; background: #007bff; }
        .game-card { background: #121212; border: 2px solid #222; padding: 25px; border-radius: 25px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        #score-val { font-size: 4rem; font-weight: 900; margin: 5px 0; }
        #level-tag { font-size: 10px; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; padding: 5px 15px; border-radius: 20px; display: inline-block; background: #1a1a1a; }
        
        /* Shop Styling */
        .shop-box { margin-top: 15px; background: #080808; padding: 15px; border-radius: 15px; border: 1px solid #1a1a1a; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .shop-item { background: #151515; border: 1px solid #222; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .shop-item:hover { border-color: #ffcc00; }
        .shop-item h4 { font-size: 10px; color: #ffcc00; margin-bottom: 4px; }
        .shop-item p { font-size: 9px; color: #555; }
        
        .main-btn { width: 100%; padding: 18px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .main-btn:active { transform: scale(0.98); }
        .back-link { display: block; color: #333; font-size: 10px; text-decoration: none; margin-top: 15px; }
        #achieve { position: fixed; top: 10%; background: #ffcc00; color: #000; padding: 10px 20px; border-radius: 8px; font-weight: bold; transform: translateY(-200px); transition: 0.5s; z-index: 100; }
        .show { transform: translateY(0) !important; }
    </style>
</head>
<body id="bg">
    <div id="achieve">BOUGHT!</div>
    <div style="font-size: 10px; color: #555; margin-bottom: 8px;">RECORD: <span id="hs">0</span></div>
    <div class="progress-container"><div id="p-bar"></div></div>

    <div class="game-card">
        <div id="level-tag">RANK: ROOKIE</div>
        <div id="score-val">0</div>
        
        <button class="main-btn" onclick="tap()">Execute Process</button>

        <div class="shop-box">
            <div class="shop-item" onclick="buyPower()">
                <h4>Double Tap</h4>
                <p>Cost: 5,000</p>
            </div>
            <div class="shop-item" onclick="buyAuto()">
                <h4>Auto-Core</h4>
                <p>Cost: 10,000</p>
            </div>
        </div>

        <a href="home.html" class="back-link">← TERMINATE SESSION</a>
    </div>

    <script>
        const API_URL = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/Sheet1";
        let score = 0;
        let power = 1;
        let autoRate = 0;
        let playerName = localStorage.getItem('ran_name');
        let highScore = parseInt(localStorage.getItem('ran_hs')) || 0;

        if (!playerName) { playerName = prompt("Nickname:") || "Agent"; localStorage.setItem('ran_name', playerName); }

        function tap() {
            score += power;
            updateUI();
            if (score % 100 < power) updateDB();
            if (score > highScore) { highScore = score; localStorage.setItem('ran_hs', highScore); }
        }

        function buyPower() {
            if (score >= 5000) {
                score -= 5000;
                power += 1;
                showMsg("POWER UPGRADED!");
            } else { alert("Not enough score!"); }
        }

        function buyAuto() {
            if (score >= 10000) {
                score -= 10000;
                autoRate += 1;
                showMsg("AUTO-CLICKER ACTIVE!");
            } else { alert("Not enough score!"); }
        }

        setInterval(() => {
            if (autoRate > 0) { score += autoRate; updateUI(); }
        }, 1000);

        function updateUI() {
            document.getElementById('score-val').innerText = score.toLocaleString();
            document.getElementById('hs').innerText = highScore.toLocaleString();
            const tag = document.getElementById('level-tag');
            if (score >= 10000) tag.innerText = "RANK: ETERNAL";
            else if (score >= 1000) tag.innerText = "RANK: GOD";
            else tag.innerText = "RANK: ROOKIE";
            document.getElementById('p-bar').style.width = (score % 100) + "%";
        }

        function showMsg(m) {
            const e = document.getElementById('achieve'); e.innerText = m; e.classList.add('show');
            setTimeout(() => e.classList.remove('show'), 2000);
        }

        function updateDB() {
            fetch(API_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ condition: { name: playerName }, set: { score: score } }) });
        }

        setInterval(updateDB, 30000);
        updateUI();
    </script>
</body>
</html>
