<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Clicker - Fix Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0b0b0b; color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .progress-container {
            width: 100%; max-width: 400px;
            background: #1a1a1a; height: 12px;
            border-radius: 10px; margin: 15px 0;
            border: 1px solid #333; overflow: hidden;
        }
        .progress-bar {
            width: 0%; height: 100%;
            background: #007bff; transition: width 0.1s;
        }
        .game-card {
            background: #121212; border: 2px solid #222;
            padding: 35px; border-radius: 25px;
            text-align: center; width: 100%; max-width: 420px;
        }
        #score-val { font-size: 5.5rem; font-weight: 900; margin: 10px 0; }
        .leaderboard {
            margin-top: 25px; background: #0a0a0a;
            padding: 15px; border-radius: 15px; border: 1px solid #1a1a1a;
        }
        .leaderboard h3 { font-size: 11px; color: #007bff; letter-spacing: 3px; margin-bottom: 12px; text-transform: uppercase; }
        .entry { display: flex; justify-content: space-between; font-size: 13px; padding: 10px 0; border-bottom: 1px solid #1a1a1a; color: #aaa; }
        .rank-1 { color: #ffcc00; font-weight: bold; }
        .main-btn {
            width: 100%; padding: 20px; background: #1a1a1a;
            color: white; border: 1px solid #333; border-radius: 15px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; box-shadow: 0 6px 0 #000;
        }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
        .back-link { margin-top: 25px; display: block; color: #444; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <div style="font-size: 11px; color: #ffcc00; margin-bottom: 5px;">BEST RECORD: <span id="hs">0</span></div>
    <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>

    <div class="game-card">
        <h2 style="font-size: 10px; color: #444; letter-spacing: 5px; margin-bottom: 10px;">CORE_PROCESSOR_v3</h2>
        <div id="score-val">0</div>
        <button class="main-btn" onclick="tap()">Execute Process</button>

        <div class="leaderboard">
            <h3>Global Top Players</h3>
            <div id="l-list">Loading Database...</div>
        </div>
        <a href="home.html" class="back-link">← TERMINATE SESSION</a>
    </div>

    <script>
        // Gunakan API URL SheetDB kamu
        const API_URL = "https://sheetdb.io/api/v1/tzwnahbmb418g"; 
        
        let playerName = localStorage.getItem('ran_name') || prompt("Input Participant Name:") || "Guest_" + Math.floor(Math.random()*1000);
        localStorage.setItem('ran_name', playerName);

        let score = 0;
        let highScore = localStorage.getItem('ran_hs') || 0;
        document.getElementById('hs').innerText = highScore;

        // FUNGSI UTAMA (Sangat Penting)
        function tap() {
            score++;
            document.getElementById('score-val').innerText = score;

            // Update Progress Bar
            let p = score % 100;
            if(p === 0 && score !== 0) p = 100;
            document.getElementById('p-bar').style.width = p + "%";

            // High Score
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('ran_hs', highScore);
                document.getElementById('hs').innerText = highScore;
            }
            
            // Simpan ke Sheets tiap 10 klik
            if(score % 10 === 0) updateDatabase();
        }

        function updateDatabase() {
            fetch(API_URL + "/name/" + playerName, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "score": score })
            }).then(res => {
                if(res.status === 404) {
                    fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ "name": playerName, "score": score })
                    });
                }
            });
        }

        function fetchLeaderboard() {
            fetch(API_URL + "?sort_by=score&sort_order=desc")
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.slice(0, 3).forEach((item, index) => {
                    html += `<div class="entry ${index === 0 ? 'rank-1' : ''}">
                                <span>${index+1}. ${item.name}</span>
                                <span>${item.score}</span>
                             </div>`;
                });
                document.getElementById('l-list').innerHTML = html;
            }).catch(err => {
                document.getElementById('l-list').innerHTML = "Check Connection";
            });
        }

        fetchLeaderboard();
        setInterval(fetchLeaderboard, 60000);
    </script>
</body>
</html>
