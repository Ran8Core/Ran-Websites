<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Clicker V3.3 - Ran Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.1s ease; }
        body { background-color: #0b0b0b; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        /* Animasi Shake */
        .shake { animation: shake-anim 0.1s infinite; }
        @keyframes shake-anim { 0% {transform: translate(3px,3px)} 50% {transform: translate(-3px,-3px)} }

        /* Progress Bar & Rainbow */
        .progress-container { width: 100%; max-width: 400px; background: #1a1a1a; height: 12px; border-radius: 10px; margin: 15px 0; border: 1px solid #333; overflow: hidden; }
        #p-bar { width: 0%; height: 100%; background: #007bff; }
        .progress-full { background: linear-gradient(90deg, #ff0000, #ffcc00, #00ff00, #007bff, #ff0000) !important; background-size: 200% !important; animation: rainbow 1.5s linear infinite; }
        @keyframes rainbow { 0%{background-position:0%} 100%{background-position:200%} }

        .game-card { background: #121212; border: 2px solid #222; padding: 35px; border-radius: 25px; text-align: center; width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); z-index: 10; }
        #score-val { font-size: 5.5rem; font-weight: 900; margin: 10px 0; transition: 0.05s; }
        .main-btn { width: 100%; padding: 20px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 6px 0 #000; }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        .leaderboard { margin-top: 25px; background: #0a0a0a; padding: 15px; border-radius: 15px; border: 1px solid #1a1a1a; }
        .entry { display: flex; justify-content: space-between; font-size: 13px; padding: 10px; border-bottom: 1px solid #1a1a1a; color: #aaa; }
        .rank-1 { color: #ffcc00 !important; font-weight: bold; border-left: 3px solid #ffcc00; padding-left: 10px !important; }
        
        .back-link { margin-top: 25px; display: block; color: #444; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body id="bg">

    <div style="font-size: 11px; color: #ffcc00; letter-spacing: 2px; margin-bottom: 5px;">BEST RECORD: <span id="hs">0</span></div>
    <div class="progress-container"><div id="p-bar"></div></div>

    <div class="game-card">
        <div style="font-size:12px; color:#007bff; font-weight:bold; letter-spacing:4px;">CLICKER V3.3</div>
        <div id="score-val">0</div>
        <button class="main-btn" onclick="tap()">Execute Process</button>
        
        <div class="leaderboard">
            <h3 style="font-size:10px; color:#555; letter-spacing:2px; margin-bottom:10px;">GLOBAL TOP PLAYERS</h3>
            <div id="l-list">Syncing Cloud...</div>
        </div>

        <a href="home.html" class="back-link">← TERMINATE SESSION</a>
        <button onclick="changeIdentity()" style="background:none; border:none; color:#222; font-size:9px; cursor:pointer; margin-top:15px;">[ RESET IDENTITY ]</button>
    </div>

    <script>
        const API_URL = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/Sheet1";
        let score = 0;
        let playerName = localStorage.getItem('ran_name');

        if (!playerName) {
            playerName = prompt("Input Nickname:") || "Player_" + Math.floor(Math.random()*999);
            localStorage.setItem('ran_name', playerName);
        }

        document.getElementById('hs').innerText = localStorage.getItem('ran_hs') || 0;

        function tap() {
            score++;
            const sVal = document.getElementById('score-val');
            sVal.innerText = score;
            
            // Efek klik kecil
            sVal.style.transform = "scale(1.1)";
            setTimeout(() => { sVal.style.transform = "scale(1)"; }, 50);

            let p = score % 100;
            if(p === 0 && score !== 0) p = 100;
            document.getElementById('p-bar').style.width = p + "%";

            // Animasi Combo 100
            if(score % 100 === 0 && score !== 0) triggerCombo();
            
            if(score > (localStorage.getItem('ran_hs') || 0)) {
                localStorage.setItem('ran_hs', score);
                document.getElementById('hs').innerText = score;
            }

            if(score % 20 === 0) updateDB();
        }

        function triggerCombo() {
            document.getElementById('bg').classList.add('shake');
            document.getElementById('p-bar').classList.add('progress-full');
            setTimeout(() => {
                document.getElementById('bg').classList.remove('shake');
                document.getElementById('p-bar').classList.remove('progress-full');
            }, 1500);
        }

        function updateDB() {
            fetch(API_URL, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    condition: { name: playerName },
                    set: { score: score }
                })
            }).then(res => res.json()).then(res => {
                if (res.updatedRows === 0) {
                    fetch(API_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify([{ name: playerName, score: score }])
                    });
                }
            });
        }

        function getLeaderboard() {
            fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                let cleanData = data.filter(p => p.name && p.name !== "null");
                cleanData.sort((a, b) => parseInt(b.score) - parseInt(a.score));
                
                let html = '';
                cleanData.slice(0, 3).forEach((p, i) => {
                    html += `<div class="entry ${i===0?'rank-1':''}">
                                <span>${i+1}. ${p.name}</span>
                                <span>${p.score}</span>
                             </div>`;
                    
                    if(p.name === playerName && score < p.score) {
                        score = parseInt(p.score);
                        document.getElementById('score-val').innerText = score;
                    }
                });
                document.getElementById('l-list').innerHTML = html || "No Data";
            }).catch(() => {
                document.getElementById('l-list').innerHTML = "Server Busy";
            });
        }

        function changeIdentity() {
            if(confirm("Ganti Nickname?")) {
                localStorage.removeItem('ran_name');
                location.reload();
            }
        }

        getLeaderboard();
        setInterval(getLeaderboard, 20000);
    </script>
</body>
</html>
