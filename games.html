<script>
    const API_URL = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/Sheet1";
    let score = 0;
    let playerName = localStorage.getItem('ran_name');
    let highScore = parseInt(localStorage.getItem('ran_hs')) || 0;
    let ownedSkins = JSON.parse(localStorage.getItem('ran_skins')) || [0];
    const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');

    // --- ADMIN COMMAND SYSTEM ---
    function initPlayer() {
        let input = prompt("Enter Nickname (or Admin CMD):");
        
        if (input && input.startsWith('/give-score ')) {
            let bonus = parseInt(input.split(' ')[1]);
            if (!isNaN(bonus)) {
                score += bonus;
                alert("SYSTEM: Added " + bonus + " points to Admin session.");
                updateUI();
                updateDB();
                // Tetap pakai nama lama setelah cheat
                if (!playerName) playerName = "Admin_Ran";
            }
        } else if (input) {
            playerName = input;
            localStorage.setItem('ran_name', playerName);
        } else if (!playerName) {
            playerName = "Agent_" + Math.floor(Math.random()*99);
            localStorage.setItem('ran_name', playerName);
        }
    }

    if (!playerName) { initPlayer(); } else {
        // Jika sudah ada nama, tapi mau panggil konsol, bisa lewat tombol reset
    }

    function tap() {
        let gain = Math.random() < 0.1 ? 2 : 1;
        score += gain;
        clickSound.currentTime = 0; clickSound.play();
        updateUI();
        if (score % 50 < gain) updateDB();
        if (score > highScore) { highScore = score; localStorage.setItem('ran_hs', highScore); }
    }

    // Fungsi Reset Identity yang dimodifikasi untuk CMD
    function changeIdentity() {
        localStorage.removeItem('ran_name');
        location.reload(); 
    }

    // ... (Fungsi handleSkin, setSkin, showTab tetap sama seperti V4.7) ...

    function updateUI() {
        document.getElementById('score-val').innerText = score.toLocaleString();
        document.getElementById('hs').innerText = highScore.toLocaleString();
        const tag = document.getElementById('level-tag');
        if (score >= 100000) tag.innerText = "RANK: UNSTOPPABLE";
        else if (score >= 10000) tag.innerText = "RANK: ETERNAL";
        else if (score >= 1000) tag.innerText = "RANK: GOD";
        else tag.innerText = "RANK: ROOKIE";
        document.getElementById('p-bar').style.width = (score % 100) + "%";
        refreshSkinButtons();
    }

    // Fungsi-fungsi lain (updateDB, getLeaderboard, dll) silakan gunakan dari V4.7
    getLeaderboard();
    updateUI();
</script>
