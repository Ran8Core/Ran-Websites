<!DOCTYPE html>

    <title>Core Clicker V5.5 | Final Milestone Edition</title>
    <style>
        :root { --main-clr: #007bff; --bg-glow: rgba(0, 123, 255, 0.15); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #050505; 
            background-image: radial-gradient(circle at center, var(--bg-glow) 0%, #050505 70%);
            color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; transition: 0.8s ease;
        }

        /* Achievement Pop-up */
        #milestone-pop {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.95); border: 3px solid var(--main-clr); padding: 40px;
            border-radius: 30px; text-align: center; z-index: 1000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 60px var(--main-clr); min-width: 300px;
        }
        #milestone-pop.active { transform: translate(-50%, -50%) scale(1); }

        .game-card { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(15px); border: 2px solid #222; padding: 25px; border-radius: 25px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; z-index: 5; }
        #score-val { font-size: 4rem; font-weight: 900; margin: 5px 0; cursor: pointer; text-shadow: 0 0 20px var(--main-clr); transition: 0.3s; }
        #score-val:hover { transform: scale(1.05); }

        .main-btn { width: 100%; padding: 20px; background: #1a1a1a; color: white; border: 1px solid var(--main-clr); border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; transition: 0.1s; }
        .main-btn:active { transform: scale(0.95); background: var(--main-clr); }

        .skin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid #222; }
        .skin-btn { height: 40px; border-radius: 10px; border: 2px solid #333; cursor: pointer; position: relative; transition: 0.2s; }
        .skin-btn:hover { transform: scale(1.1); border-color: #fff; }
        .skin-btn.owned::before { content: 'OWNED'; position: absolute; top: -14px; left: 0; width: 100%; font-size: 7px; color: #00ff00; font-weight: 900; letter-spacing: 1px; }

        #admin-console { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); border: 1px solid #00ff00; padding: 12px; border-radius: 10px; display: none; width: 320px; z-index: 100; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        #console-input { width: 100%; background: transparent; border: none; color: #00ff00; font-family: 'Courier New', monospace; outline: none; font-size: 14px; }
    </style>
</head>
