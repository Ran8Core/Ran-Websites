<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Clicker - Global Leaderboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0b0b0b; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px; transition: background 0.2s;
        }

        /* PROGRESS BAR */
        .progress-container {
            width: 100%; max-width: 400px;
            background: #1a1a1a; height: 12px;
            border-radius: 10px; margin: 15px 0;
            border: 1px solid #333; overflow: hidden;
        }
        .progress-bar {
            width: 0%; height: 100%;
            background: #007bff; transition: width 0.1s ease;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.5);
        }
        .progress-full {
            background: linear-gradient(90deg, #ff0000, #ffcc00, #00ff00, #007bff, #ff0000);
            background-size: 200%; animation: rainbow 1.5s linear infinite;
        }
        @keyframes rainbow { 0%{background-position:0%} 100%{background-position:200%} }

        /* GAME CARD */
        .game-card {
            background: #121212; border: 2px solid #222;
            padding: 35px; border-radius: 25px;
            text-align: center; width: 100%; max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        #score-val { font-size: 5.5rem; font-weight: 900; margin: 10px 0; transition: transform 0.1s; }

        /* LEADERBOARD */
        .leaderboard {
            margin-top: 25px; background: #0a0a0a;
            padding: 15px; border-radius: 15px; border: 1px solid #1a1a1a;
        }
        .leaderboard h3 { font-size: 11px; color: #007bff; letter-spacing: 3px; margin-bottom: 12px; text-transform: uppercase; }
        .entry { display: flex; justify-content: space-between; font-size: 13px; padding: 10px 0; border-bottom: 1px solid #1a1a1a; color: #aaa; }
        .rank-1 { color: #ffcc00; font-weight: bold; }

        /* BUTTONS */
        .main-btn {
            width: 100%; padding: 20px; background: #1a1a1a;
            color: white; border: 1px solid #333; border-radius: 15px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; box-shadow: 0 6px 0 #000;
        }
        .main-btn:hover { border-color: #007bff; color: #007bff; }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        .back-link { margin-top: 25px; display: block; color: #444; text-decoration: none; font-size: 12px; transition: 0.3s; }
        .back-link:hover { color: #fff; }
        
        /* SHAKE EFFECT */
        .shake { animation: shake-anim 0.1s infinite; }
        @keyframes shake-anim { 0% {transform: translate(3px,3px)} 50% {transform: translate(-3px,-3px)} }
    </style>
</head>
<body id="bg">

    <div style="font-size: 11px; color: #ffcc00; letter-spacing: 2px; margin-bottom: 5px;">BEST RECORD: <span id="hs">0</span></div>
    
    <div class="progress-container">
        <div id="p-bar" class="progress-bar"></div>
    </div>

    <div class="game-card">
        <h2 style="font-size: 10px; color: #444; letter-spacing: 5px; margin-bottom: 10px;">CORE_PROCESSOR_v3</h2>
        <div id="score-val">0</div>
        <button class="main-btn" onclick="tap()">Execute Process</button>

        <div class="leaderboard">
            <h3>Global Top Players</h3>
            <div id="l-list">Loading Database...</div>
        </div>

        <a href="home.html" class="back-link">← TERMINATE SESSION</a>
    </div>

    <script>
        // --- KONFIGURASI DATABASE ---
        const API_URL = "https://sheetdb.io/api/v1/tzwnahbmb418g"; 
        
        let playerName = localStorage.getItem('ran_name') || prompt("Input Participant Name:") || "Guest_" + Math.floor(Math.random()*1000);
        localStorage.setItem('ran_name', playerName);

        let score = 0;
        let highScore = localStorage.getItem('ran_hs') || 0;
        document.getElementById('hs').innerText = highScore;

        const scoreText = document.getElementById('score-val');
        const pBar = document.getElementById('p-bar');
        const bg = document.getElementById('bg');

        // 1. FUNGSI KLIK UTAMA
        function tap() {
            score++;
            scoreText.innerText = score;

            // Efek Scale
            scoreText.style.transform = "scale(1.2)";
            setTimeout(() => scoreText.style.transform = "scale(1)", 100);

            // Progress Bar (0-100)
            let p = score % 100;
            if(p === 0 && score !== 0) p = 100;
            pBar.style.width = p + "%";

            // Update High Score & Database tiap kelipatan 10
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('ran_hs', highScore);
                document.getElementById('hs').innerText = highScore;
            }
            
            if(score % 10 === 0) updateDatabase();

            // Efek Kelipatan 100
            if(score % 100 === 0) {
                pBar.classList.add('progress-full');
                triggerCombo();
            } else if(score % 100 === 1) {
                pBar.classList.remove('progress-full');
            }
        }
