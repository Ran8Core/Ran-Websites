<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Clicker - Ran 8Core</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            flex-direction: column;
            transition: background 0.2s;
        }

        /* SCREEN SHAKE */
        .ultra-shake {
            animation: shake-anim 0.1s infinite;
        }
        @keyframes shake-anim {
            0% { transform: translate(3px, 3px); }
            50% { transform: translate(-3px, -3px); }
            100% { transform: translate(0,0); }
        }

        /* PROGRESS BAR */
        .progress-container {
            width: 100%;
            max-width: 400px;
            background: #1a1a1a;
            height: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #007bff;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.5);
            transition: width 0.1s ease;
        }

        .progress-full {
            background: linear-gradient(90deg, #ff0000, #ffcc00, #00ff00, #007bff, #ff0000);
            background-size: 200%;
            animation: rainbow 1.5s linear infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0%; }
            100% { background-position: 200%; }
        }

        /* CARD */
        .game-card {
            background: #121212;
            border: 2px solid #222;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            max-width: 450px;
            width: 90%;
            position: relative;
        }

        .hs-label {
            font-size: 11px;
            color: #ffcc00;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        #high-score-val {
            font-weight: bold;
            color: #ffcc00;
        }

        #score-val {
            font-size: 6rem;
            font-weight: 900;
            margin: 10px 0;
            transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #fff;
        }

        /* BUTTON */
        .main-btn {
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #000;
        }

        .main-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #000;
        }

        .main-btn:hover {
            border-color: #007bff;
            color: #007bff;
        }

        /* BACK LINK */
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #444;
            text-decoration: none;
            font-size: 11px;
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .back-link:hover { 
            color: #fff; 
            border-color: #333;
            background: rgba(255,255,255,0.05); 
        }

    </style>
</head>
<body id="bg">

    <div class="hs-label">Best Record: <span id="high-score-val">0</span></div>

    <div class="progress-container">
        <div id="p-bar" class="progress-bar"></div>
    </div>

    <div class="game-card">
        <h2 style="font-size: 10px; color: #555; letter-spacing: 4px; text-transform: uppercase;">Core Clicker v2.0</h2>
        <div id="score-val">0</div>
        
        <button class="main-btn" onclick="tap()">Execute Process</button>
        
        <a href="home.html" class="back-link">← TERMINATE SESSION</a>
    </div>

    <script>
        let score = 0;
        // AMBIL HIGH SCORE DARI STORAGE
        let highScore = localStorage.getItem('ran8core_hs') || 0;
        
        const scoreText = document.getElementById('score-val');
        const hsText = document.getElementById('high-score-val');
        const pBar = document.getElementById('p-bar');
        const bg = document.getElementById('bg');

        // TAMPILKAN HIGH SCORE SAAT LOAD
        hsText.innerText = highScore;

        function tap() {
            score++;
            scoreText.innerText = score;

            // 1. UPDATE HIGH SCORE
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('ran8core_hs', highScore);
                hsText.innerText = highScore;
            }

            // 2. PROGRESS BAR LOGIC
            let currentProgress = score % 100;
            if (currentProgress === 0 && score !== 0) currentProgress = 100;
            pBar.style.width = currentProgress + "%";

            // 3. ANIMASI CLICK
            scoreText.style.transform = "scale(1.2)";
            setTimeout(() => scoreText.style.transform = "scale(1)", 100);

            // 4. KELIPATAN 100 (SUPER COMBO)
            if (score % 100 === 0) {
                pBar.classList.add('progress-full');
                triggerCombo();
            } else if (score % 100 === 1) {
                // Reset warna bar setelah lewat 100
                pBar.classList.remove('progress-full');
            }
        }

        function triggerCombo() {
            bg.classList.add('ultra-shake');
            scoreText.style.color = "#ffcc00";
            scoreText.style.textShadow = "0 0 40px #ffcc00";
            bg.style.background = "#1a1500";

            setTimeout(() => {
                bg.classList.remove('ultra-shake');
                bg.style.background = "#0b0b0b";
                scoreText.style.color = "#ffffff";
                scoreText.style.textShadow = "none";
            }, 1000);
        }
    </script>
</body>
</html>
