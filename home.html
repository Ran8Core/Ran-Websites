<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ran Website - Dashboard</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            animation: fadeInPage 1.5s ease forwards;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logout Position */
        .logout-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .btn-logout {
            padding: 8px 15px;
            background: #161616;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            border-radius: 5px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: #ff4d4d;
            color: white;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.3);
        }

        .container { text-align: center; }

        /* Profile Section */
        .profile-section {
            margin-bottom: 20px;
        }

        #profile-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #007bff;
            display: none;
            margin: 0 auto 10px;
        }

        #default-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .upload-label {
            display: block;
            font-size: 11px;
            color: #555;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 5px;
        }

        #file-input { display: none; }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 3px;
            margin: 10px 0 5px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        #clock {
            font-size: 5rem;
            font-weight: bold;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #161616;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: #222;
            border-color: #007bff;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.2);
        }

        .status {
            margin-top: 50px;
            font-size: 12px;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #28a745;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="logout-container">
        <a href="#" class="btn-logout" onclick="logout()">LOGOUT</a>
    </div>

    <div class="container">
        <div class="profile-section">
            <img id="profile-preview" src="#" alt="Profile">
            <div id="default-icon">👤</div>
            <label for="file-input" class="upload-label">Change Photo</label>
            <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)">
        </div>

        <h1 id="user-display">WELCOME, RAN</h1>
        <p class="subtitle">TJKT Student & Network Enthusiast</p>

        <div id="clock">00:00:00</div>

        <div class="btn-group">
            <a href="aboutme.html" class="btn">👤 ABOUT ME</a>
            <a href="projects.html" class="btn">🚀 PROJECTS</a>
        </div>

        <div class="status">
            <span class="dot"></span> Network Status: Connected
        </div>
    </div>

    <script>
        // 1. Jam Digital
        function updateClock() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById("clock").innerText = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Greeting & Load Profile
        window.onload = function() {
            // Nama User
            const namaUser = localStorage.getItem("activeUser") || "RAN";
            document.getElementById("user-display").innerText = "WELCOME, " + namaUser.toUpperCase();

            // Foto Profil
            const savedPic = localStorage.getItem("profilePic");
            if(savedPic) {
                const img = document.getElementById('profile-preview');
                img.src = savedPic;
                img.style.display = 'block';
                document.getElementById('default-icon').style.display = 'none';
            }
        }

        // 3. Upload Foto
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('profile-preview');
                const icon = document.getElementById('default-icon');
                output.src = reader.result;
                output.style.display = 'block';
                icon.style.display = 'none';
                localStorage.setItem("profilePic", reader.result);
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        // 4. Logout
        function logout() {
            localStorage.removeItem("activeUser");
            localStorage.removeItem("profilePic")
            // Kalau mau foto ikut kehapus pas logout, buka komen di bawah:
            // localStorage.removeItem("profilePic");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
