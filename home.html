<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ran Website - Dashboard</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            animation: fadeInPage 1.5s ease forwards;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logout Pojok Kanan Atas */
        .logout-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .btn-logout {
            padding: 8px 15px;
            background: #161616;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            border-radius: 5px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: #ff4d4d;
            color: white;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.3);
        }

        .container { text-align: center; }

        /* Profile Section */
        .profile-section { margin-bottom: 20px; }
        #profile-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #007bff;
            display: none;
            margin: 0 auto 10px;
        }
        #default-icon { font-size: 60px; margin-bottom: 10px; }
        .upload-label {
            display: block;
            font-size: 11px;
            color: #555;
            cursor: pointer;
            text-decoration: underline;
        }
        #file-input { display: none; }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 3px;
            margin: 10px 0 5px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
