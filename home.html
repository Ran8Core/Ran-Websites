<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ran Website - Dashboard</title>
    <style>
        :root { --main-blue: #007bff; }
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            animation: fadeInPage 1.2s ease forwards;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container { text-align: center; display: flex; flex-direction: column; align-items: center; width: 100%; }
        h1 { font-size: 2.5rem; letter-spacing: 3px; margin: 10px 0 5px; text-transform: uppercase; width: 100%; }
        .subtitle { color: #888; font-size: 14px; margin: 0 0 30px 0; width: 100%; text-align: center; }

        .logout-container { position: absolute; top: 20px; right: 20px; }
        .btn-logout {
            padding: 8px 15px;
            background: #161616;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            border-radius: 5px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-logout:hover { background: #ff4d4d; color: white; }

        .profile-section { margin-bottom: 20px; text-align: center; position: relative; }
        #profile-preview {
            width: 100px; height: 100px;
            border-radius: 50%; object-fit: cover;
            border: 2px solid var(--main-blue); display: none; margin: 0 auto 10px;
        }
        #default-icon { font-size: 60px; margin-bottom: 10px; }
        .upload-label { font-size: 11px; color: #555; cursor: pointer; text-decoration: underline; }

        .time-box {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: baseline;
        }
        #day-label {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--main-blue);
            -webkit-text-fill-color: var(--main-blue);
        }

        .btn-group { display: flex; gap: 20px; }
        .btn {
            padding: 15px 30px; border: 1px solid #333; border-radius: 8px;
            background: #161616; color: white; text-decoration: none;
            font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .btn:hover { border-color: var(--main-blue); transform: translateY(-3px); }

        .status { margin-top: 50px; font-size: 12px; color: #555; display: flex; align-items: center; gap: 5px; }
        .dot { height: 8px; width: 8px; background-color: #28a745; border-radius: 50%; }

        /* Loader */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0b0b0b; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease;
        }
        .loader-text { color: var(--main-blue); font-family: monospace; letter-spacing: 3px; margin-bottom: 20px; font-weight: bold; }
        .progress-container { width: 250px; height: 4px; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
        .progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            background-size: 200% 100%;
            animation: loadAnim 2s forwards, rainbow 2s linear infinite;
        }
        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        @keyframes loadAnim { 0% { width: 0%; } 100% { width: 100%; } }
    </style>
</head>
<body>

<div id="loader-wrapper">
    <div class="loader-text">INITIALIZING SYSTEM...</div>
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
</div>

<div class="logout-container">
    <a href="#" class="btn-logout" onclick="logout()">LOGOUT</a>
</div>

<div class="container">
    <div class="profile-section">
        <img id="profile-preview" src="#" alt="Profile">
        <div id="default-icon">👤</div>
        <label for="file-input" class="upload-label">Change Photo</label>
        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="previewImage(event)">
    </div>

    <h1 id="user-display">WELCOME</h1>
    <p class="subtitle">TJKT Student & Network Enthusiast</p>

    <div class="time-box">
        <span id="day-label">DAY</span>
        <span id="clock">00:00:00</span>
    </div>

    <div class="btn-group">
        <a href="aboutme.html" class="btn">👤 ABOUT DEVELOPER</a>
        <a href="projects.html" class="btn">🚀 PROJECTS</a>
        <a href="games.html" class="btn">🎮 Play Mini Games</a>
    </div>

    <div class="status">
        <span class="dot"></span> Network Status: Connected
    </div>
</div>

<script>
    // 1. UPDATE JAM & HARI
    function updateTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById("clock").innerText = `${h}:${m}:${s}`;

        const days = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];
        document.getElementById("day-label").innerText = days[now.getDay()];
    }
    setInterval(updateTime, 1000);
    updateTime();

    // 2. FUNGSI PREVIEW & SIMPAN FOTO
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('profile-preview');
            const icon = document.getElementById('default-icon');
            output.src = reader.result;
            output.style.display = 'block';
            icon.style.display = 'none';
            localStorage.setItem("profilePic", reader.result);
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    // 3. LOGIKA UTAMA (LOAD DATA) - DIJADIKAN SATU FUNGSI
    window.onload = function() {
        // Cek Login
        const checkUser = localStorage.getItem("ran8user");
        if(!checkUser) {
            window.location.href = "index.html";
            return;
        }
        document.getElementById("user-display").innerText = "WELCOME, " + checkUser.toUpperCase();

        // Load Foto Profil
        const savedPic = localStorage.getItem("profilePic");
        if(savedPic) {
            const img = document.getElementById('profile-preview');
            const icon = document.getElementById('default-icon');
            img.src = savedPic;
            img.style.display = 'block';
            icon.style.display = 'none';
        }

        // Matikan Loader
        const loader = document.getElementById("loader-wrapper");
        setTimeout(() => {
            loader.style.opacity = "0";
            setTimeout(() => {
                loader.style.display = "none";
            }, 500);
        }, 2000);
    };

    function logout() {
        localStorage.removeItem("ran8user");
        window.location.href = "index.html";
    }
</script>
    <div id="log-container">
    <div id="log-box"></div>
</div>

<style>
    #log-container {
    position: fixed;
    top: 20px;         /* PINDAH KE ATAS */
    left: 20px;        /* TETAP DI KIRI */
    width: 200px;      /* Kecilin dikit biar gak menuhi layar */
    height: 80px;
    background: rgba(0, 0, 0, 0.4); /* Tipis aja biar makin clean */
    border-left: 2px solid #00d1ff;
    padding: 8px;
    font-size: 9px;
    color: rgba(0, 209, 255, 0.7); /* Warna agak redup biar gak distrak */
    font-family: 'Consolas', monospace;
    overflow: hidden;
    pointer-events: none;
    z-index: 10;
}
    #log-box div {
        margin-bottom: 4px;
        border-left: 2px solid #00d1ff;
        padding-left: 5px;
        animation: fadeInLog 0.3s ease;
    }
    @keyframes fadeInLog {
        from { opacity: 0; transform: translateX(10px); }
        to { opacity: 1; transform: translateX(0); }
    }
</style>
    <script>
    const logs = [
        "[INFO] Initializing RAN8_CORE...",
        "[OK] System handshake success",
        "[DEBUG] Fetching user_profile...",
        "[INFO] Syncing with Stein_DB...",
        "[WARN] Packet latency: 42ms",
        "[OK] Encryption active (AES-256)",
        "[INFO] Scanning for updates...",
        "[DEBUG] Buffer cleared",
        "[INFO] Listening on port 8080",
        "[OK] Rank data updated",
        "[INFO] Executing background_tasks..."
    ];

    function addLog() {
        const logBox = document.getElementById('log-box');
        const newLog = document.createElement('div');
        
        // Pilih log acak
        const randomLog = logs[Math.floor(Math.random() * logs.length)];
        const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        newLog.innerText = `[${time}] ${randomLog}`;
        logBox.appendChild(newLog);

        // Hapus log lama biar gak numpuk kebawah
        if (logBox.childNodes.length > 5) {
            logBox.removeChild(logBox.childNodes[0]);
        }
    }

    // Munculin log baru tiap 4 - 7 detik biar natural
    function scheduleNextLog() {
        const delay = Math.random() * (7000 - 4000) + 4000;
        setTimeout(() => {
            addLog();
            scheduleNextLog();
        }, delay);
    }

    // Jalankan
    addLog();
    scheduleNextLog();
</script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<div id="particles-js" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div>

<script>
particlesJS("particles-js", {
  "particles": {
    "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
    "color": { "value": "#00d1ff" },
    "shape": { "type": "circle" },
    "opacity": { "value": 0.2, "random": false },
    "size": { "value": 3, "random": true },
    "line_linked": { "enable": true, "distance": 150, "color": "#00d1ff", "opacity": 0.2, "width": 1 },
    "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
  },
  "interactivity": {
    "detect_on": "canvas",
    "events": {
      "onhover": { "enable": true, "mode": "grab" }, /* Di HP jadi mode sentuh */
      "onclick": { "enable": true, "mode": "push" }
    },
    "modes": {
      "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
      "push": { "particles_nb": 4 }
    }
  },
  "retina_detect": true
});
</script>
    <div id="transition-overlay"></div>

<style>
    #transition-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #0b0b0b; /* Samain sama warna bg body */
        z-index: 10001; /* Di atas segalanya termasuk loader */
        pointer-events: none;
        opacity: 1; /* Mulai dengan layar gelap */
        transition: opacity 0.6s ease;
    }
    
    /* Kelas buat nutup layar pas pindah */
    .fade-out-active {
        opacity: 1 !important;
        pointer-events: all !important;
    }
</style>
    
</body>
</html>
