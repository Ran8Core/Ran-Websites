<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ran Website - Dashboard</title>
    <style>
        /* CSS Utama */
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* Efek Fade In saat halaman terbuka */
            animation: fadeInPage 1.5s ease forwards;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 40px;
        }

        /* Styling Jam Digital */
        #clock {
            font-size: 5rem;
            font-weight: bold;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        /* Tombol-tombol */
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #161616;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: #222;
            border-color: #007bff;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.2);
        }

        /* Status di bawah */
        .status {
            margin-top: 50px;
            font-size: 12px;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #28a745;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="user-display">WELCOME, RAN</h1>
        <p class="subtitle">TXT Student & Tester Website</p>

        <div id="clock">00:00:00</div>

        <div class="btn-group">
            <a href="aboutme.html" class="btn">👤 ABOUT ME</a>
            <a href="projects.html" class="btn">🚀 PROJECTS</a>
        </div>

        <div class="status">
            <span class="dot"></span> Network Status: Connected
        </div>
    </div>

    <script>
        // 1. LOGIKA JAM DIGITAL
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();

            h = h < 10 ? "0" + h : h;
            m = m < 10 ? "0" + m : m;
            s = s < 10 ? "0" + s : s;

            document.getElementById("clock").innerText = h + ":" + m + ":" + s;
        }
        setInterval(updateClock, 1000);
        updateClock(); // Jalankan langsung

        // 2. LOGIKA GANTI NAMA (DYNAMIC GREETING)
        // Ambil nama dari memori login tadi
        const namaUser = localStorage.getItem("activeUser") || "RAN";
        
        // Ganti teks Welcome
        const display = document.getElementById("user-display");
        if(display) {
            display.innerText = "WELCOME, " + namaUser.toUpperCase();
        }
    </script>
</body>
</html>
