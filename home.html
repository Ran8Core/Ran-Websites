<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ran</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: inline-block;
        }
        h1 { color: #00d4ff; }
        .btn {
            display: inline-block;
            padding: 15px 25px;
            margin: 10px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-normal {
            background-color: #444;
            color: white;
        }
        .btn-normal:hover { background-color: #555; }

        /* Tombol Gacha Khusus */
        .btn-gacha {
            background: linear-gradient(45deg, #ff00ea, #00d4ff);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 234, 0.4);
        }
        .btn-gacha:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dashboard Jaringan & IT</h1>
        <p>Silahkan pilih menu navigasi di bawah ini:</p>
        
        <nav>
            <a href="index.html" class="btn btn-normal">Logout</a>
            <a href="aboutme.html" class="btn btn-normal">About Developer</a>
            <a href="gacha.html" class="btn btn-gacha">🎰 Gacha Sekarang!</a>
            <a href="games.html" class="btn btn-gacha">Game clicker</a
        </nav>
    </div>

</body>
</html>
