<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAN8CORE - Auth</title>
    <style>
        :root { --main-clr: #00d1ff; --bg-clr: #0a0a0a; }
        body { background-color: var(--bg-clr); color: white; font-family: 'Consolas', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: #161616; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 300px; text-align: center; }
        h2 { color: var(--main-clr); font-size: 18px; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: var(--main-clr); border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .btn-login { background: var(--main-clr); border: none; color: #000; }
        .btn-reg { background: transparent; border: 1px solid #555; color: #aaa; }
        #msg { font-size: 11px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>SYSTEM ACCESS</h2>
    <input type="text" id="user-input" placeholder="USERNAME">
    <input type="password" id="pass-input" placeholder="PASSWORD">
    <button class="btn-login" onclick="handleAuth('login')">LOGIN</button>
    <button class="btn-reg" onclick="handleAuth('register')">REGISTER</button>
    <p id="msg"></p>
</div>

<script>
    // URL sudah diarahkan ke sheet 'users' sesuai screenshot lo
    const USER_API = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/users";

    async function handleAuth(type) {
        const user = document.getElementById('user-input').value.trim();
        const pass = document.getElementById('pass-input').value.trim();
        const msg = document.getElementById('msg');

        if(!user || !pass) return alert("Isi username & password!");

        msg.innerText = "PROCESSING...";

        try {
            const res = await fetch(USER_API);
            const data = await res.json();
            const found = data.find(u => u.username === user);

            if(type === 'login') {
                if(found && found.password === pass) {
                    localStorage.setItem("ran8user", user);
                    // SETELAH LOGIN, KE HOME (TERMINAL)
                    window.location.href = "home.html"; 
                } else {
                    msg.innerText = "WRONG USERNAME/PASSWORD";
                }
            // Bagian di dalam handleAuth untuk 'register'
} else {
    await fetch(USER_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        // PASTIIN BAGIAN INI SAMA DENGAN HEADER DI GOOGLE SHEETS
        body: JSON.stringify([{ 
            username: user, // Ini harus 'username' sesuai kolom A
            password: pass  // Ini harus 'password' sesuai kolom B
        }])
    });
    msg.style.color = "#00d1ff";
    msg.innerText = "REGISTER SUCCESS! PLEASE LOGIN.";
}
                }
            }
        } catch (e) {
            msg.innerText = "DATABASE ERROR";
        }
    }
</script>
</body>
</html>
