<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAN8CORE - Access Terminal</title>
    <style>
        :root { --main-clr: #00d1ff; --bg-clr: #0a0a0a; }
        body { background-color: var(--bg-clr); color: white; font-family: 'Consolas', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: #161616; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 300px; text-align: center; box-shadow: 0 0 20px rgba(0, 209, 255, 0.1); }
        h2 { color: var(--main-clr); font-size: 18px; margin-bottom: 20px; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: var(--main-clr); border-radius: 5px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--main-clr); }
        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.2s; }
        .btn-login { background: var(--main-clr); border: none; color: #000; }
        .btn-reg { background: transparent; border: 1px solid #555; color: #aaa; }
        .btn-login:hover { opacity: 0.8; }
        .btn-reg:hover { border-color: var(--main-clr); color: var(--main-clr); }
        #msg { font-size: 11px; margin-top: 15px; min-height: 15px; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>SYSTEM AUTH</h2>
    <input type="text" id="user-input" placeholder="USERNAME">
    <input type="password" id="pass-input" placeholder="PASSWORD">
    <button class="btn-login" onclick="handleAuth('login')">LOGIN</button>
    <button class="btn-reg" onclick="handleAuth('register')">CREATE ACCOUNT</button>
    <p id="msg"></p>
</div>

<script>
    const USER_API = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/Users";

    async function handleAuth(type) {
        const user = document.getElementById('user-input').value.trim();
        const pass = document.getElementById('pass-input').value.trim();
        const msg = document.getElementById('msg');

        if(!user || !pass) {
            msg.style.color = "orange";
            msg.innerText = "ACCESS DENIED: EMPTY FIELDS";
            return;
        }

        msg.style.color = "white";
        msg.innerText = "AUTHENTICATING...";

        try {
            const res = await fetch(USER_API);
            const data = await res.json();
            const found = data.find(u => u.username === user);

            if(type === 'login') {
                if(found && found.password === pass) {
                    localStorage.setItem("ran8user", user);
                    window.location.href = "games.html";
                } else {
                    msg.style.color = "#ff4444";
                    msg.innerText = "INVALID CREDENTIALS";
                }
            } else {
                if(found) {
                    msg.style.color = "#ff4444";
                    msg.innerText = "USERNAME TAKEN";
                } else {
                    await fetch(USER_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify([{ username: user, password: pass }])
                    });
                    msg.style.color = var(--main-clr);
                    msg.innerText = "ACCOUNT CREATED. PLEASE LOGIN.";
                }
            }
        } catch (e) {
            msg.innerText = "CONNECTION ERROR";
        }
    }
</script>
</body>
</html>
