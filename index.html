<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAN8CORE - Access</title>
    <style>
        :root { --main-clr: #00d1ff; --bg-clr: #0a0a0a; }
        body { background-color: var(--bg-clr); color: white; font-family: 'Consolas', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: #161616; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--main-clr); font-size: 18px; letter-spacing: 2px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: var(--main-clr); border-radius: 5px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--main-clr); }
        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; border: none; transition: 0.3s; }
        .btn-login { background: var(--main-clr); color: #000; }
        .btn-login:hover { background: #00b8e6; }
        .btn-reg { background: transparent; border: 1px solid #555; color: #aaa; }
        .btn-reg:hover { border-color: #777; color: #fff; }
        #msg { font-size: 11px; margin-top: 15px; min-height: 15px; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>SYSTEM AUTH</h2>
    <input type="text" id="user-input" placeholder="USERNAME" autocomplete="off">
    <input type="password" id="pass-input" placeholder="PASSWORD">
    
    <button class="btn-login" onclick="handleAuth('login')">LOGIN</button>
    <button class="btn-reg" onclick="handleAuth('register')">CREATE ACCOUNT</button>
    
    <p id="msg">READY TO CONNECT...</p>
</div>

<script>
    // URL API lo (Sheet: users)
    const USER_API = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/users";

    async function handleAuth(type) {
        const userField = document.getElementById('user-input');
        const passField = document.getElementById('pass-input');
        const msg = document.getElementById('msg');

        const user = userField.value.trim();
        const pass = passField.value.trim();

        if(!user || !pass) {
            msg.style.color = "orange";
            msg.innerText = "FILL ALL FIELDS!";
            return;
        }

        msg.style.color = "white";
        msg.innerText = "CONNECTING...";

        try {
            // Tambah timestamp (?t=) biar gak kena cache (data selalu fresh)
            const res = await fetch(USER_API + "?t=" + new Date().getTime());
            const data = await res.json();
            
            // Cari user (Case Insensitive & Anti-Gacha)
            const found = data.find(u => 
                u.username && u.username.toString().trim().toLowerCase() === user.toLowerCase()
            );

            if(type === 'login') {
                if(found && found.password.toString().trim() === pass) {
                    msg.style.color = "#00d1ff";
                    msg.innerText = "ACCESS GRANTED!";
                    localStorage.setItem("ran8user", found.username);
                    
                    // Delay dikit biar keren, terus pindah ke home
                    setTimeout(() => { window.location.href = "home.html"; }, 1000);
                } else {
                    msg.style.color = "#ff4444";
                    msg.innerText = "WRONG USERNAME/PASSWORD";
                }
            } else {
                // LOGIKA REGISTER
                if(found) {
                    msg.style.color = "#ff4444";
                    msg.innerText = "USERNAME ALREADY TAKEN";
                } else {
                    msg.innerText = "CREATING DATA...";
                    const reg = await fetch(USER_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify([{ 
                            "username": user, 
                            "password": pass 
                        }])
                    });

                    if(reg.ok) {
                        msg.style.color = "#00d1ff";
                        msg.innerText = "REGISTER SUCCESS! PLEASE LOGIN.";
                        userField.value = "";
                        passField.value = "";
                    } else {
                        msg.innerText = "SERVER ERROR";
                    }
                }
            }
        } catch (error) {
            console.error(error);
            msg.style.color = "#ff4444";
            msg.innerText = "CONNECTION FAILED";
        }
    }
</script>

</body>
</html>
