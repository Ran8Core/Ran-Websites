<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Restricted Access</title>
    <style>
        body {
            background-color: #0b0b0b; /* Warna gelap deep */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-box {
            background: #161616; /* Box muncul kembali dengan warna ini */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            text-align: center;
            width: 350px;
            border: 1px solid #222;
            transition: opacity 0.6s ease, transform 0.6s ease;
            opacity: 1;
        }

        /* Ini class yang bikin hilang pas login sukses */
        .fade-out {
            opacity: 0;
            transform: scale(0.9); /* Sedikit mengecil pas hilang biar keren */
            pointer-events: none;
        }

        h2 { margin-bottom: 5px; letter-spacing: 1px; }
        p { color: #777; font-size: 14px; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #007bff; background: #2a2a2a; }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover { background: #0056b3; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        #message { color: #ff4d4d; font-size: 13px; margin-top: 15px; min-height: 18px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Locked Access</h2>
        <p>Enter credentials to enter</p>
        
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="password" id="password" placeholder="Password">
        
        <button onclick="handleLogin()">Login</button>
        <div id="message"></div>
    </div>

    <script>
        function handleLogin() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            const msg = document.getElementById('message');
            const box = document.querySelector('.login-box');

            // Data 4 User kamu
            const users = [
                { user: "admin", pass: "123" },
                { user: "guest", pass: "tamu" },
                { user: "dev", pass: "koding" },
                { user: "ZuraSayang", pass: "ApaSayang?" }
            ];

            const validUser = users.find(u => u.user === userIn && u.pass === passIn);

            if (validUser) {
                // Jalankan animasi fade-out
                box.classList.add('fade-out');
                
                // Tunggu animasi selesai baru pindah
                setTimeout(function() {
                    window.location.href = "home.html"; 
                }, 600); 
            } else {
                msg.innerText = "Akses ditolak! kalo salah lagi GAY.";
                // Efek getar dikit kalau salah
                box.style.transform = "translateX(10px)";
                setTimeout(() => box.style.transform = "translateX(-10px)", 100);
                setTimeout(() => box.style.transform = "translateX(0)", 200);
            }
        }
    </script>
</body>
</html>
