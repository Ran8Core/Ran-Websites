<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAN8CORE - Access</title>
    <style>
        :root { --main-clr: #00d1ff; --bg-clr: #0a0a0a; }
        body { background-color: var(--bg-clr); color: white; font-family: 'Consolas', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: #161616; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: var(--main-clr); border-radius: 5px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.2s; }
        .btn-login { background: var(--main-clr); border: none; color: #000; }
        .btn-reg { background: transparent; border: 1px solid #555; color: #aaa; }
        #msg { font-size: 11px; margin-top: 15px; color: #888; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 style="color:var(--main-clr); font-size:18px;">SYSTEM AUTH</h2>
    <input type="text" id="user-input" placeholder="USERNAME">
    <input type="password" id="pass-input" placeholder="PASSWORD">
    
    <button class="btn-login" onclick="handleAuth('login')">LOGIN</button>
    <button class="btn-reg" onclick="handleAuth('register')">CREATE ACCOUNT</button>
    
    <p id="msg">READY TO CONNECT...</p>
</div>

<script>
    // 1. Definisikan API di paling atas
    const USER_API = "https://api.steinhq.com/v1/storages/69b58629affba40a625fa191/users";

  async function handleAuth(type) {
    // Pakai .toLowerCase() biar huruf besar/kecil gak pengaruh pas login
    const user = document.getElementById('user-input').value.trim().toLowerCase();
    const pass = document.getElementById('pass-input').value.trim();
    const msg = document.getElementById('msg');

    if(!user || !pass) return alert("Isi username & password!");

    msg.innerText = "CONNECTING...";

    try {
        const res = await fetch(USER_API);
        const data = await res.json();
        
        // Cari user dengan lebih teliti (abaikan huruf besar/kecil)
        const found = data.find(u => u.username && u.username.toString().trim().toLowerCase() === user);

        if(type === 'login') {
            if(found && found.password.toString().trim() === pass) {
                msg.innerText = "ACCESS GRANTED!";
                localStorage.setItem("ran8user", found.username); // Simpan nama asli dari Sheets
                
                // Pindah ke HOME (pastikan nama filenya bener)
                setTimeout(() => { window.location.href = "home.html"; }, 500);
            } else {
                msg.innerText = "WRONG USERNAME/PASSWORD";
                msg.style.color = "red";
            }
        } else {
            // REGISTRASI
            if(found) {
                msg.innerText = "USERNAME ALREADY TAKEN";
            } else {
                await fetch(USER_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify([{ username: user, password: pass }])
                });
                msg.innerText = "REGISTER SUCCESS! PLEASE LOGIN.";
                msg.style.color = "#00d1ff";
            }
        }
    } catch (e) {
        msg.innerText = "DATABASE ERROR";
    }
}

            if(found) {
                msg.innerText = "USERNAME ALREADY TAKEN";
            } else {
                await fetch(USER_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify([{ username: user, password: pass }])
                });
                msg.innerText = "REGISTER SUCCESS! PLEASE LOGIN.";
                msg.style.color = "#00d1ff";
            }
        }
    } catch (e) {
        msg.innerText = "DATABASE ERROR";
    }
}
</script>

</body>
</html>
